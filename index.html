<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Secure Communication</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0f172a; --side: #111827; --p: #6366f1; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; --accent: #10b981; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        #sidebar { width: 350px; background: var(--side); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        
        .add-btn { background: var(--p); border: none; color: white; padding: 10px 15px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; transition: 0.2s; }
        .add-btn:hover { background: #4f46e5; }
        
        .nav-tabs { display: flex; padding: 10px; gap: 5px; overflow-x: auto; }
        .tab { padding: 8px 12px; text-align: center; border-radius: 8px; font-size: 11px; cursor: pointer; background: rgba(255,255,255,0.05); white-space: nowrap; flex: 1; transition: 0.2s; }
        .tab.active { background: var(--p); }

        .content-area { flex: 1; overflow-y: auto; padding: 20px; }
        .user-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .user-card:hover { background: rgba(255,255,255,0.05); }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--p); display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; }

        .block-icon { color: var(--danger); cursor: pointer; opacity: 0.3; transition: 0.2s; }
        .user-card:hover .block-icon { opacity: 1; }

        #chat { flex: 1; display: flex; flex-direction: column; }
        #msg-history { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .bubble { padding: 12px 18px; border-radius: 18px; max-width: 65%; font-size: 14px; word-wrap: break-word; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--p); border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal { background: var(--card); padding: 30px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; background: var(--bg); color: white; outline: none; }
        input:focus { border: 1px solid var(--p); }
    </style>
</head>
<body>

    <div id="auth-screen" class="overlay" style="display: flex;">
        <div class="modal">
            <h1 style="letter-spacing: -1px; margin-bottom: 5px;">NEXUS</h1>
            <p style="font-size: 12px; color: var(--text); opacity: 0.6; margin-bottom: 20px;">Secure Communication</p>
            <input type="text" id="my-name" placeholder="Enter Username..." onkeypress="if(event.key==='Enter')login()">
            <button onclick="login()" class="add-btn" style="width: 100%; justify-content: center; padding: 14px; margin-top: 10px;">Join Chat</button>
        </div>
    </div>

    <div id="search-modal" class="overlay">
        <div class="modal">
            <h3>Discover Users</h3>
            <p style="font-size: 12px; opacity: 0.6; margin-top: 5px;">Type exact username</p>
            <input type="text" id="search-u" placeholder="Username..." onkeyup="searchUser(this.value)">
            <div id="search-result"></div>
            <button onclick="closeSearch()" style="color:white; background:none; border:none; margin-top:20px; cursor:pointer; opacity: 0.6;">Cancel</button>
        </div>
    </div>

    <aside id="sidebar">
        <div class="sidebar-header">
            <h2>Nexus</h2>
            <button class="add-btn" onclick="openSearch()"><i data-lucide="search"></i></button>
        </div>
        <div class="nav-tabs">
            <div class="tab active" id="tab-friends" onclick="showTab('friends')">Friends</div>
            <div class="tab" id="tab-reqs" onclick="showTab('reqs')">Pending <span id="req-count"></span></div>
            <div class="tab" id="tab-blocked" onclick="showTab('blocked')">Blocked</div>
        </div>
        <div id="content" class="content-area"></div>
    </aside>

    <main id="chat">
        <div style="padding: 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); background: var(--side);">
            <h3 id="chatting-with" style="opacity: 0.5;">Select a contact</h3>
        </div>
        <div id="msg-history"></div>
        <div style="padding: 25px; background: var(--side); display: flex; gap: 15px; border-top: 1px solid rgba(255,255,255,0.05);">
            <input type="text" id="msg-in" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMsg()">
            <button onclick="sendMsg()" class="add-btn" style="padding: 0 25px;"><i data-lucide="send"></i></button>
        </div>
    </main>

    <script>
        lucide.createIcons();
        // CONNECT TO YOUR RENDER SERVER
        const socket = io('https://nexus-w4w9.onrender.com'); 
        
        let me = "";
        let currentFriend = "";
        let data = { friends: [], requests: [], blocked: [] };

        function login() {
            me = document.getElementById('my-name').value.trim();
            if(!me) return;
            socket.emit('nexus-auth', me);
            document.getElementById('auth-screen').style.display = 'none';
        }

        socket.on('auth-success', (res) => { 
            data = res; 
            showTab('friends'); 
            updateUI(); 
        });

        // --- SEARCH & ADD FRIEND ---
        function openSearch() { 
            document.getElementById('search-modal').style.display = 'flex'; 
            document.getElementById('search-u').focus();
        }
        function closeSearch() { 
            document.getElementById('search-modal').style.display = 'none'; 
            document.getElementById('search-result').innerHTML = ''; 
            document.getElementById('search-u').value = '';
        }
        function searchUser(val) { 
            if(val.length > 1) socket.emit('find-user', val); 
        }

        socket.on('user-found', (user) => {
            document.getElementById('search-result').innerHTML = `
                <div class="user-card" style="margin-top:15px; cursor:default;">
                    <div style="display:flex; align-items:center;">
                        <div class="avatar">${user.username[0].toUpperCase()}</div>
                        <span>${user.username}</span>
                    </div>
                    <button class="add-btn" onclick="addFriend('${user.username}')" style="background:var(--accent);">Add</button>
                </div>`;
        });

        function addFriend(name) { 
            socket.emit('send-friend-request', name); 
            closeSearch(); 
            alert("Request sent to " + name);
        }

        // --- BLOCK SYSTEM ---
        function blockUser(name, e) {
            e.stopPropagation();
            if(confirm(`Block ${name}? They won't be able to contact you.`)) {
                socket.emit('block-user', name);
                if(currentFriend.toLowerCase() === name.toLowerCase()) clearChat();
            }
        }

        function unblockUser(name) {
            socket.emit('unblock-user', name);
        }

        function clearChat() {
            currentFriend = "";
            document.getElementById('chatting-with').innerText = "Select a contact";
            document.getElementById('chatting-with').style.opacity = "0.5";
            document.getElementById('msg-history').innerHTML = "";
        }

        // --- TAB RENDERING ---
        function showTab(type) {
            const content = document.getElementById('content');
            content.innerHTML = "";
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + type).classList.add('active');

            if(type === 'friends') {
                if(data.friends.length === 0) content.innerHTML = "<p style='text-align:center; opacity:0.4; margin-top:20px; font-size:14px;'>No friends yet</p>";
                data.friends.forEach(f => {
                    const div = document.createElement('div');
                    div.className = 'user-card';
                    div.onclick = () => startChat(f);
                    div.innerHTML = `
                        <div style="display:flex; align-items:center;">
                            <div class="avatar">${f[0].toUpperCase()}</div>
                            <span>${f}</span>
                        </div>
                        <i data-lucide="ban" class="block-icon" onclick="blockUser('${f}', event)" title="Block User"></i>
                    `;
                    content.appendChild(div);
                });
            } else if(type === 'reqs') {
                if(data.requests.length === 0) content.innerHTML = "<p style='text-align:center; opacity:0.4; margin-top:20px; font-size:14px;'>No pending requests</p>";
                data.requests.forEach(r => {
                    const div = document.createElement('div');
                    div.className = 'user-card';
                    div.style.cursor = "default";
                    div.innerHTML = `
                        <div style="display:flex; align-items:center;">
                            <div class="avatar">${r[0].toUpperCase()}</div>
                            <span>${r}</span>
                        </div>
                        <button class="add-btn" onclick="accept('${r}')" style="background:var(--accent);">Accept</button>
                    `;
                    content.appendChild(div);
                });
            } else {
                if(data.blocked.length === 0) content.innerHTML = "<p style='text-align:center; opacity:0.4; margin-top:20px; font-size:14px;'>No blocked users</p>";
                data.blocked.forEach(b => {
                    const div = document.createElement('div');
                    div.className = 'user-card';
                    div.style.cursor = "default";
                    div.innerHTML = `
                        <div style="display:flex; align-items:center;">
                            <div class="avatar" style="background:var(--danger)">${b[0].toUpperCase()}</div>
                            <span>${b}</span>
                        </div>
                        <button class="add-btn" style="background:transparent; border:1px solid var(--danger); color:var(--danger);" onclick="unblockUser('${b}')">Unblock</button>
                    `;
                    content.appendChild(div);
                });
            }
            lucide.createIcons();
        }

        function accept(name) { socket.emit('accept-request', name); }

        socket.on('friend-list-update', (newList) => {
            data.friends = newList;
            if(document.getElementById('tab-friends').classList.contains('active')) showTab('friends');
        });

        socket.on('incoming-request', (req) => { 
            data.requests.push(req.from); 
            updateUI(); 
            if(document.getElementById('tab-reqs').classList.contains('active')) showTab('reqs'); 
        });

        function updateUI() {
            const count = document.getElementById('req-count');
            count.innerText = data.requests.length > 0 ? `(${data.requests.length})` : '';
            count.style.color = data.requests.length > 0 ? 'var(--accent)' : 'inherit';
        }

        // --- CHAT LOGIC ---
        function startChat(name) {
            currentFriend = name;
            document.getElementById('chatting-with').innerText = `@${name}`;
            document.getElementById('chatting-with').style.opacity = "1";
            document.getElementById('msg-history').innerHTML = "";
            document.getElementById('msg-in').focus();
        }

        function sendMsg() {
            const inputField = document.getElementById('msg-in');
            const text = inputField.value.trim();
            if(!text || !currentFriend) return;
            
            socket.emit('send-msg', { to: currentFriend, text: text });
            inputField.value = "";
        }

        socket.on('receive-msg', (m) => { 
            // Only show message if we are currently chatting with the sender
            if(currentFriend && m.from.toLowerCase() === currentFriend.toLowerCase()) {
                appendMsg(m.from, m.text, 'received'); 
            } else {
                console.log("New background message from:", m.from);
                // Optionally add a notification dot to their name in the sidebar here
            }
        });

        socket.on('msg-delivered', (m) => { 
            appendMsg('Me', m.text, 'sent'); 
        });

        function appendMsg(user, text, type) {
            const history = document.getElementById('msg-history');
            const div = document.createElement('div');
            div.className = `bubble ${type}`;
            div.innerText = text; // innerText is safer than innerHTML to prevent XSS
            history.appendChild(div);
            history.scrollTop = history.scrollHeight;
        }
    </script>
</body>
</html>
