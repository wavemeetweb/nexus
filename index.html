<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zenith Nexus</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <style>
        :root { --bg: #050608; --accent: #6366f1; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --text: #f8fafc; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar & Layout */
        #sidebar { width: 350px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg); z-index: 10; transition: 0.3s; }
        #chat-window { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            #sidebar { position: absolute; width: 100%; height: 100%; left: 0; }
            #sidebar.hidden { transform: translateX(-100%); }
            .bubble { max-width: 90% !important; }
        }

        /* Message Bubbles */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 16px; border-radius: 20px; max-width: 75%; position: relative; cursor: pointer; transition: transform 0.1s; }
        .bubble:active { transform: scale(0.98); }
        .sent { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .recv { align-self: flex-start; background: var(--glass); border-bottom-left-radius: 4px; }
        .deleted { opacity: 0.4; font-style: italic; font-size: 12px; }

        /* Context Menu */
        #ctx-menu { position: fixed; display: none; background: #1a1b23; border: 1px solid var(--border); border-radius: 12px; z-index: 5000; overflow: hidden; width: 180px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #ctx-menu button { width: 100%; padding: 12px; border: none; background: none; color: white; text-align: left; cursor: pointer; border-bottom: 1px solid var(--border); }
        #ctx-menu button:hover { background: var(--accent); }

        /* Shared Components */
        .glass-box { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin: 10px; }
        .input-area { padding: 10px; display: flex; gap: 10px; align-items: center; border-top: 1px solid var(--border); }
        input { background: var(--glass); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; width: 100%; outline: none; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div style="padding: 25px 20px; display:flex; justify-content:space-between; align-items:center;">
            <h2>ZENITH</h2>
            <i data-lucide="plus-square" onclick="showGroupModal()"></i>
        </div>
        <div id="contact-list" style="flex:1; overflow-y:auto;"></div>
    </aside>

    <main id="chat-window">
        <header style="padding:15px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:15px;">
            <i data-lucide="arrow-left" id="back-btn" onclick="goBack()" style="display:none"></i>
            <div style="flex:1">
                <h3 id="active-title">Select a Chat</h3>
                <small id="active-status" style="color:var(--accent); cursor:pointer" onclick="showMemberActions()"></small>
            </div>
            <i data-lucide="trash-2" onclick="clearLocalHistory()" style="opacity:0.5; cursor:pointer"></i>
        </header>

        <div id="messages"></div>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:10px; color:white;"><i data-lucide="send"></i></button>
        </div>
    </main>

    <div id="ctx-menu">
        <button id="btn-del-everyone" style="color:#ff4d4d">Delete for Everyone</button>
        <button onclick="hideMenu()">Cancel</button>
    </div>

    <script>
        const socket = io();
        let myU = "", activeT = "", isGrp = false, selMsgId = null;

        window.onload = () => {
            myU = prompt("Enter Username:").toLowerCase().trim();
            if(myU) socket.emit('auth', myU);
            renderContacts();
            lucide.createIcons();
        };

        // --- REAL MESSAGE LOGIC ---
        async function send() {
            const text = document.getElementById('msg-input').value;
            if(!text || !activeT) return;
            const msg = { to: activeT, isGroup: isGrp, text, from: 'Me', id: 'm_'+Date.now() };
            socket.emit('msg-send', msg);
            await saveMsg(activeT, msg);
            renderBubble(msg);
            document.getElementById('msg-input').value = "";
        }

        socket.on('msg-recv', async (d) => {
            const channel = d.isGroup ? d.to : d.from;
            await saveMsg(channel, d);
            if(activeT === channel) renderBubble(d);
        });

        // --- REAL DELETE BROADCAST ---
        function openMenu(e, msgId, fromMe) {
            e.preventDefault();
            selMsgId = msgId;
            const menu = document.getElementById('ctx-menu');
            menu.style.display = 'block';
            menu.style.top = e.pageY + 'px';
            menu.style.left = e.pageX + 'px';
            document.getElementById('btn-del-everyone').style.display = fromMe ? 'block' : 'none';
            document.getElementById('btn-del-everyone').onclick = () => {
                socket.emit('delete-msg', { msgId, to: activeT, isGroup: isGrp });
                hideMenu();
            };
        }

        socket.on('msg-deleted-global', async (data) => {
            const h = await localforage.getItem(`chat_${activeT}`) || [];
            const updated = h.map(m => m.id === data.msgId ? { ...m, text: "This message was deleted", deleted: true } : m);
            await localforage.setItem(`chat_${activeT}`, updated);
            refreshChat();
        });

        // --- REAL GROUP LOGIC ---
        function showGroupModal() {
            const name = prompt("New Group Name:");
            if(name) socket.emit('create-group', { name });
        }

        socket.on('group-created', async (g) => {
            const grps = await localforage.getItem('groups') || {};
            grps[g.gid] = g;
            await localforage.setItem('groups', grps);
            renderContacts();
        });

        socket.on('added-to-group', async (g) => {
            const grps = await localforage.getItem('groups') || {};
            grps[g.gid] = g;
            await localforage.setItem('groups', grps);
            renderContacts();
        });

        function showMemberActions() {
            if(!isGrp) return;
            const target = prompt("Type username to add to this group:");
            if(target) socket.emit('add-to-group', { gid: activeT, target });
        }

        // --- UI CORE ---
        async function renderContacts() {
            const friends = ['RealPerson1', 'RealPerson2']; // In real app, fetch from DB
            const grps = await localforage.getItem('groups') || {};
            const list = document.getElementById('contact-list');
            list.innerHTML = "";
            
            Object.values(grps).forEach(g => {
                const d = document.createElement('div');
                d.className = "glass-box"; d.style.cursor="pointer";
                d.innerHTML = `<b>👥 ${g.name}</b>`;
                d.onclick = () => selectChat(g.gid, g.name, true);
                list.appendChild(d);
            });
        }

        function selectChat(id, name, group) {
            activeT = id; isGrp = group;
            document.getElementById('active-title').innerText = name;
            document.getElementById('active-status').innerText = isGrp ? "Manage Members" : "Secure Chat";
            if(window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('hidden');
                document.getElementById('back-btn').style.display = 'block';
            }
            refreshChat();
        }

        async function refreshChat() {
            document.getElementById('messages').innerHTML = "";
            const h = await localforage.getItem(`chat_${activeT}`) || [];
            h.forEach(renderBubble);
        }

        function renderBubble(m) {
            const b = document.createElement('div');
            const fromMe = m.from === 'Me' || m.from === myU;
            b.className = `bubble ${fromMe ? 'sent' : 'recv'}`;
            b.id = m.id;
            b.innerHTML = m.deleted ? `<span class="deleted">Message deleted</span>` : m.text;
            b.oncontextmenu = (e) => openMenu(e, m.id, fromMe);
            document.getElementById('messages').appendChild(b);
            document.getElementById('messages').scrollTop = 99999;
        }

        function goBack() { document.getElementById('sidebar').classList.remove('hidden'); }
        function hideMenu() { document.getElementById('ctx-menu').style.display = 'none'; }
        async function saveMsg(id, m) {
            const h = await localforage.getItem(`chat_${id}`) || [];
            h.push(m); await localforage.setItem(`chat_${id}`, h);
        }
        window.onclick = hideMenu;
    </script>
</body>
</html>
