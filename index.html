<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus | Secure Communication</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0f172a; --side: #111827; --p: #6366f1; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        #sidebar { width: 350px; background: var(--side); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        
        .add-btn { background: var(--p); border: none; color: white; padding: 10px 15px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .nav-tabs { display: flex; padding: 10px; gap: 5px; overflow-x: auto; }
        .tab { padding: 8px 12px; text-align: center; border-radius: 8px; font-size: 11px; cursor: pointer; background: rgba(255,255,255,0.05); white-space: nowrap; }
        .tab.active { background: var(--p); }

        .content-area { flex: 1; overflow-y: auto; padding: 20px; }
        .user-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--p); display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; }

        .block-icon { color: var(--danger); cursor: pointer; opacity: 0.3; }
        .user-card:hover .block-icon { opacity: 1; }

        #chat { flex: 1; display: flex; flex-direction: column; }
        #msg-history { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 18px; border-radius: 18px; max-width: 65%; font-size: 14px; }
        .sent { align-self: flex-end; background: var(--p); }
        .received { align-self: flex-start; background: var(--card); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal { background: var(--card); padding: 30px; border-radius: 20px; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: var(--bg); color: white; }
    </style>
</head>
<body>

    <div id="auth-screen" class="overlay" style="display: flex;">
        <div class="modal">
            <h1>NEXUS</h1>
            <input type="text" id="my-name" placeholder="Enter Username...">
            <button onclick="login()" class="add-btn" style="width: 100%; justify-content: center;">Join</button>
        </div>
    </div>

    <div id="search-modal" class="overlay">
        <div class="modal">
            <h3>Discover Users</h3>
            <input type="text" id="search-u" placeholder="Username..." onkeyup="searchUser(this.value)">
            <div id="search-result"></div>
            <button onclick="closeSearch()" style="color:white; background:none; border:none; margin-top:15px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <aside id="sidebar">
        <div class="sidebar-header">
            <h2>Nexus</h2>
            <button class="add-btn" onclick="openSearch()"><i data-lucide="search"></i></button>
        </div>
        <div class="nav-tabs">
            <div class="tab active" id="tab-friends" onclick="showTab('friends')">Friends</div>
            <div class="tab" id="tab-reqs" onclick="showTab('reqs')">Pending <span id="req-count"></span></div>
            <div class="tab" id="tab-blocked" onclick="showTab('blocked')">Blocked</div>
        </div>
        <div id="content" class="content-area"></div>
    </aside>

    <main id="chat">
        <div style="padding: 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <h3 id="chatting-with">Select a contact</h3>
        </div>
        <div id="msg-history"></div>
        <div style="padding: 25px; background: var(--side); display: flex; gap: 15px;">
            <input type="text" id="msg-in" placeholder="Secure message..." onkeypress="if(event.key==='Enter')sendMsg()">
            <button onclick="sendMsg()" class="add-btn">Send</button>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const socket = io('http://localhost:3000'); // SET TO RENDER URL
        let me = "";
        let currentFriend = "";
        let data = { friends: [], requests: [], blocked: [] };

        function login() {
            me = document.getElementById('my-name').value;
            if(!me) return;
            socket.emit('nexus-auth', me);
            document.getElementById('auth-screen').style.display = 'none';
        }

        socket.on('auth-success', (res) => { 
            data = res; 
            showTab('friends'); 
            updateUI(); 
        });

        function openSearch() { document.getElementById('search-modal').style.display = 'flex'; }
        function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }
        function searchUser(val) { if(val.length > 1) socket.emit('find-user', val); }

        socket.on('user-found', (user) => {
            document.getElementById('search-result').innerHTML = `
                <div class="user-card" style="margin-top:10px">
                    <span>${user.username}</span>
                    <button class="add-btn" onclick="addFriend('${user.username}')">Add</button>
                </div>`;
        });

        function addFriend(name) { socket.emit('send-friend-request', name); closeSearch(); }

        function blockUser(name, e) {
            e.stopPropagation();
            if(confirm(`Block ${name}? They won't be able to contact you.`)) {
                socket.emit('block-user', name);
                if(currentFriend === name) clearChat();
            }
        }

        function unblockUser(name) {
            socket.emit('unblock-user', name);
        }

        function clearChat() {
            currentFriend = "";
            document.getElementById('chatting-with').innerText = "Select a contact";
            document.getElementById('msg-history').innerHTML = "";
        }

        function showTab(type) {
            const content = document.getElementById('content');
            content.innerHTML = "";
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + type).classList.add('active');

            if(type === 'friends') {
                data.friends.forEach(f => {
                    const div = document.createElement('div');
                    div.className = 'user-card';
                    div.onclick = () => startChat(f);
                    div.innerHTML = `
                        <div style="display:flex; align-items:center;">
                            <div class="avatar">${f[0].toUpperCase()}</div>
                            <span>${f}</span>
                        </div>
                        <i data-lucide="ban" class="block-icon" onclick="blockUser('${f}', event)"></i>
                    `;
                    content.appendChild(div);
                });
            } else if(type === 'reqs') {
                data.requests.forEach(r => {
                    const div = document.createElement('div');
                    div.className = 'user-card';
                    div.innerHTML = `<span>${r}</span> <button class="add-btn" onclick="accept('${r}')">Accept</button>`;
                    content.appendChild(div);
                });
            } else {
                data.blocked.forEach(b => {
                    const div = document.createElement('div');
                    div.className = 'user-card';
                    div.innerHTML = `<span>${b}</span> <button class="add-btn" style="background:var(--danger)" onclick="unblockUser('${b}')">Unblock</button>`;
                    content.appendChild(div);
                });
            }
            lucide.createIcons();
        }

        function accept(name) { socket.emit('accept-request', name); }

        socket.on('friend-list-update', (newList) => {
            data.friends = newList;
            if(document.getElementById('tab-friends').classList.contains('active')) showTab('friends');
        });

        socket.on('incoming-request', (req) => { 
            data.requests.push(req.from); 
            updateUI(); 
            if(document.getElementById('tab-reqs').classList.contains('active')) showTab('reqs'); 
        });

        function updateUI() {
            document.getElementById('req-count').innerText = data.requests.length > 0 ? `(${data.requests.length})` : '';
        }

        function startChat(name) {
            currentFriend = name;
            document.getElementById('chatting-with').innerText = `@${name}`;
            document.getElementById('msg-history').innerHTML = "";
        }

        function sendMsg() {
            const text = document.getElementById('msg-in').value;
            if(!text || !currentFriend) return;
            socket.emit('send-msg', { to: currentFriend, text: text });
            document.getElementById('msg-in').value = "";
        }

        socket.on('receive-msg', (m) => { if(m.from === currentFriend) appendMsg(m.from, m.text, 'received'); });
        socket.on('msg-delivered', (m) => { appendMsg('Me', m.text, 'sent'); });

        function appendMsg(user, text, type) {
            const div = document.createElement('div');
            div.className = `bubble ${type}`;
            div.innerText = text;
            document.getElementById('msg-history').appendChild(div);
            document.getElementById('msg-history').scrollTop = 99999;
        }
    </script>
</body>
</html>
