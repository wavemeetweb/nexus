<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Zenith</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0b0e14; --side: #151a21; --p: #6366f1; --card: #1e2430; --text: #e2e8f0; --dim: #64748b; --border: #2a313c; --danger: #ef4444; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Navigation */
        #sidebar { width: 340px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; z-index: 10; }
        #chat-main { flex: 1; display: flex; flex-direction: column; position: relative; transition: 0.3s; background: var(--bg); }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; inset: 0; }
            #chat-main { width: 100%; position: absolute; inset: 0; transform: translateX(100%); }
            body.in-chat #chat-main { transform: translateX(0); }
        }

        /* Modals */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(10px); }
        .modal { background: var(--card); padding: 25px; border-radius: 24px; width: 92%; max-width: 400px; border: 1px solid var(--border); }
        input, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: white; margin-top: 10px; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; }

        /* Elements */
        .av { width: 40px; height: 40px; border-radius: 12px; background: var(--p); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; overflow: hidden; object-fit: cover; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; position: relative; }
        .sent { align-self: flex-end; background: var(--p); color: white; border-bottom-right-radius: 4px; }
        .recv { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .status { font-size: 11px; margin-left: 5px; opacity: 0.7; }
        .status.read { color: #4ade80 !important; }
        
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        #typing-indicator { padding: 5px 20px; font-size: 12px; color: var(--p); height: 20px; display: none; }
        
        /* Audio Player Styles */
        .audio-player { display: flex; align-items: center; gap: 10px; min-width: 150px; }
        .rec-active { color: var(--danger) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="modal-auth" class="overlay" style="display: flex;">
        <div class="modal" style="text-align: center;">
            <h1 style="margin-bottom: 20px;">NEXUS</h1>
            <input type="text" id="auth-in" placeholder="Username...">
            <button class="btn" style="background:var(--p); color:white" onclick="login()">Enter</button>
        </div>
    </div>

    <div id="modal-settings" class="overlay">
        <div class="modal">
            <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:15px;">
                <label style="cursor:pointer; position:relative;">
                    <img id="set-pic-preview" src="" style="width:80px; height:80px; border-radius:20px; object-fit:cover; background:var(--p); display:none;">
                    <div id="set-pic-placeholder" class="av" style="width:80px; height:80px; font-size:30px;">?</div>
                    <input type="file" id="pic-upload" style="display:none" accept="image/*" onchange="previewPic(this)">
                    <div style="position:absolute; bottom:0; right:0; background:var(--p); padding:4px; border-radius:50%;"><i data-lucide="camera" style="width:14px; height:14px;"></i></div>
                </label>
            </div>
            <input type="text" id="set-name" placeholder="Display Name">
            <textarea id="set-bio" placeholder="Bio..."></textarea>
            <button class="btn" style="background:var(--p); color:white" onclick="saveProfile()">Save Profile</button>
            <button class="btn" style="background:transparent; color:var(--dim)" onclick="closeModals()">Close</button>
        </div>
    </div>

    <aside id="sidebar">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img id="my-pic" style="width:32px; height:32px; border-radius:8px; object-fit:cover; display:none;">
                <div class="av" id="my-av-box" style="width:32px; height:32px; font-size:12px;">?</div>
                <b id="my-display-name" style="font-size:14px;">...</b>
            </div>
            <div style="display: flex; gap: 15px; color: var(--dim);">
                <i data-lucide="user-plus" onclick="inviteUser()" style="cursor:pointer; width:18px;"></i>
                <i data-lucide="settings" onclick="openSettings()" style="cursor:pointer; width:18px;"></i>
            </div>
        </div>
        <div id="main-list" style="flex:1; overflow-y:auto;"></div>
    </aside>

    <main id="chat-main">
        <header style="height:70px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; justify-content:space-between; background:var(--side);">
            <div style="display:flex; align-items:center;">
                <i data-lucide="arrow-left" class="mobile-only" onclick="document.body.classList.remove('in-chat')" style="margin-right:15px; color:var(--p)"></i>
                <h4 id="active-title">Nexus</h4>
            </div>
        </header>
        <div id="messages"></div>
        <div id="typing-indicator"></div>
        <div style="padding:15px 20px; background:var(--side); display:flex; gap:12px; align-items:center; padding-bottom: calc(15px + env(safe-area-inset-bottom));">
            <input type="text" id="msg-in" placeholder="Message..." style="flex:1; margin:0;" onkeypress="if(event.key==='Enter')send()">
            <i data-lucide="mic" id="mic-btn" style="cursor:pointer; color:var(--dim);" onclick="toggleRecord()"></i>
            <i data-lucide="send" onclick="send()" style="color:var(--p); cursor:pointer;"></i>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const socket = io('https://nexus-w4w9.onrender.com');
        let myId = "", activeTarget = "", localPic = null, mediaRecorder, audioChunks = [];

        function login() { 
            const n = document.getElementById('auth-in').value.trim(); 
            if(n){ myId=n; socket.emit('nexus-auth', n); document.getElementById('modal-auth').style.display='none'; } 
        }

        socket.on('ui-sync', (data) => {
            document.getElementById('my-display-name').innerText = data.profile.name;
            if(data.profile.pic) {
                document.getElementById('my-pic').src = data.profile.pic;
                document.getElementById('my-pic').style.display = 'block';
                document.getElementById('my-av-box').style.display = 'none';
                localPic = data.profile.pic;
            } else {
                document.getElementById('my-av-box').innerText = data.profile.name[0].toUpperCase();
            }

            const mList = document.getElementById('main-list'); mList.innerHTML = "";
            data.friends.forEach(f => {
                const d = document.createElement('div');
                d.style.padding = "15px"; d.style.display = "flex"; d.style.alignItems = "center"; d.style.gap = "12px"; d.style.cursor = "pointer";
                d.innerHTML = `<div class="av" style="width:35px; height:35px; font-size:12px;">${f[0].toUpperCase()}</div><b>${f}</b>`;
                d.onclick = () => {
                    activeTarget = f;
                    document.getElementById('active-title').innerText = f;
                    document.body.classList.add('in-chat');
                    document.getElementById('messages').innerHTML = "";
                };
                mList.appendChild(d);
            });
        });

        function renderMsg(s, t, side, mid, audioData) {
            const d = document.createElement('div'); d.className = `bubble ${side}`; d.setAttribute('data-id', mid);
            let content = t;
            if(audioData) {
                content = `<div class="audio-player"><i data-lucide="play" onclick="playAudio('${audioData}')"></i> <div style="width:100px; height:3px; background:rgba(255,255,255,0.2); border-radius:2px;"></div></div>`;
            }
            d.innerHTML = `<small style="display:block; opacity:0.6; font-size:10px;">${s}</small>${content}${side==='sent'?'<span class="status">✓</span>':''}`;
            document.getElementById('messages').appendChild(d);
            lucide.createIcons();
            document.getElementById('messages').scrollTop = 99999;
        }

        function playAudio(base64) { new Audio(base64).play(); }

        async function toggleRecord() {
            const btn = document.getElementById('mic-btn');
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/ogg' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        const base64 = reader.result;
                        const mid = Date.now();
                        socket.emit('msg-out', { to: activeTarget, audio: base64, id: mid });
                        renderMsg('Me', '', 'sent', mid, base64);
                    };
                };
                mediaRecorder.start();
                btn.classList.add('rec-active');
            } else {
                mediaRecorder.stop();
                btn.classList.remove('rec-active');
            }
        }

        function previewPic(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('set-pic-preview').src = e.target.result;
                    document.getElementById('set-pic-preview').style.display = 'block';
                    document.getElementById('set-pic-placeholder').style.display = 'none';
                    localPic = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveProfile() {
            socket.emit('profile-update', {
                name: document.getElementById('set-name').value,
                bio: document.getElementById('set-bio').value,
                pic: localPic,
                socials: {}
            });
            closeModals();
        }

        socket.on('msg-in', (d) => {
            if (d.fromSlug === activeTarget.toLowerCase()) {
                renderMsg(d.from, d.text || '', 'recv', d.id, d.audio);
            }
        });

        function send() {
            const t = document.getElementById('msg-in').value.trim();
            if(t && activeTarget) {
                const mid = Date.now();
                socket.emit('msg-out', { to: activeTarget, text: t, id: mid });
                renderMsg('Me', t, 'sent', mid);
                document.getElementById('msg-in').value = "";
            }
        }

        function openSettings() { document.getElementById('modal-settings').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.overlay').forEach(o=>o.style.display='none'); }
        function inviteUser() { const n = prompt("Username:"); if(n) socket.emit('req-send', n); }
    </script>
</body>
</html>
