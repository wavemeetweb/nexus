<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Zenith Nexus</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        :root { --bg: #050608; --accent: #6366f1; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --text: #f8fafc; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        #sidebar { width: 350px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #chat-window { flex: 1; display: flex; flex-direction: column; background: #000; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px; border-radius: 18px; max-width: 80%; position: relative; }
        .sent { align-self: flex-end; background: var(--accent); }
        .recv { align-self: flex-start; background: var(--glass); border: 1px solid var(--border); }
        .header { height: 70px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); justify-content: space-between; }
        .input-area { padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid var(--border); }
        input { flex:1; background: var(--glass); border:1px solid var(--border); color:#fff; padding:12px; border-radius:25px; outline:none; }
        #video-container { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:none; z-index:1000; flex-direction:column; }
        video { width: 100%; height: 50%; background: #222; object-fit: cover; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline style="height:30%; border:2px solid var(--accent)"></video>
        <button onclick="endCall()" style="padding:20px; background:red; color:white; border:none;">End Call</button>
    </div>

    <aside id="sidebar">
        <div style="padding:20px;"><h2>ZENITH</h2></div>
        <div id="contact-list"></div>
    </aside>

    <main id="chat-window">
        <header class="header">
            <h3 id="active-title">Select Chat</h3>
            <div style="display:flex; gap:20px;">
                <i data-lucide="phone" onclick="startCall('voice')"></i>
                <i data-lucide="video" onclick="startCall('video')"></i>
            </div>
        </header>
        <div id="messages"></div>
        <div class="input-area">
            <label><i data-lucide="paperclip"></i><input type="file" style="display:none" onchange="sendFile(this)"></label>
            <input type="text" id="m-in" placeholder="Message..." onkeypress="if(event.key==='Enter')send()">
            <i data-lucide="mic" id="mic-icon" onclick="toggleVoiceNote()"></i>
            <button onclick="send()" style="background:var(--accent); border:none; padding:8px; border-radius:50%; color:#fff;"><i data-lucide="send"></i></button>
        </div>
    </main>

    <script>
        const socket = io();
        let myU = "", activeT = "", peer, localStream, mediaRecorder, audioChunks = [];

        window.onload = async () => {
            myU = await localforage.getItem('u') || prompt("Username:").toLowerCase();
            await localforage.setItem('u', myU);
            socket.emit('auth', myU);
            lucide.createIcons();
            // Load dummy contacts for demo
            renderContacts(['Alice', 'Group_Alpha']);
        };

        // --- CORE MESSAGING ---
        async function send() {
            const text = document.getElementById('m-in').value;
            const msg = { to: activeT, text, type: 'text', id: 'm_'+Date.now(), isGroup: activeT.includes('Group') };
            socket.emit('msg-send', msg);
            renderBubble({...msg, from: 'Me'});
            document.getElementById('m-in').value = "";
        }

        socket.on('msg-recv', (d) => { if(activeT === d.from || activeT === d.to) renderBubble(d); });

        // --- DOCUMENTS & VOICE ---
        function sendFile(el) {
            const file = el.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                socket.emit('msg-send', { to: activeT, type: 'doc', text: file.name, data: reader.result });
            };
            reader.readAsDataURL(file);
        }

        async function toggleVoiceNote() {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/ogg' });
                    const reader = new FileReader();
                    reader.onload = () => socket.emit('msg-send', { to: activeT, type: 'voice', data: reader.result });
                    reader.readAsDataURL(blob);
                    audioChunks = [];
                };
                mediaRecorder.start();
                document.getElementById('mic-icon').style.color = 'red';
            } else {
                mediaRecorder.stop();
                document.getElementById('mic-icon').style.color = 'inherit';
            }
        }

        // --- VIDEO CALLING ---
        async function startCall(type) {
            document.getElementById('video-container').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: type === 'video', audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            
            peer = new SimplePeer({ initiator: true, stream: localStream, trickle: false });
            peer.on('signal', data => socket.emit('call-request', { to: activeT, type, offer: data }));
            peer.on('stream', stream => document.getElementById('remoteVideo').srcObject = stream);
        }

        socket.on('incoming-call', async (d) => {
            if (confirm(`Incoming ${d.type} call from ${d.from}`)) {
                document.getElementById('video-container').style.display = 'flex';
                localStream = await navigator.mediaDevices.getUserMedia({ video: d.type === 'video', audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                
                peer = new SimplePeer({ initiator: false, stream: localStream, trickle: false });
                peer.on('signal', data => socket.emit('call-answer', { to: d.from, answer: data }));
                peer.on('stream', stream => document.getElementById('remoteVideo').srcObject = stream);
                peer.signal(d.offer);
            }
        });

        socket.on('call-accepted', d => peer.signal(d.answer));

        // --- UI HELPERS ---
        function renderBubble(m) {
            const b = document.createElement('div');
            b.className = `bubble ${m.from === 'Me' ? 'sent' : 'recv'}`;
            if (m.type === 'voice') b.innerHTML = `<audio controls src="${m.data}"></audio>`;
            else if (m.type === 'doc') b.innerHTML = `<a href="${m.data}" download="${m.text}" style="color:white">📄 ${m.text}</a>`;
            else b.innerText = m.text;
            
            // Long press to delete
            b.oncontextmenu = (e) => {
                e.preventDefault();
                if(confirm("Delete for everyone?")) socket.emit('delete-msg', { msgId: m.id, to: activeT, isGroup: m.isGroup });
            };
            document.getElementById('messages').appendChild(b);
        }

        socket.on('msg-deleted-global', d => {
            const el = document.getElementById(d.msgId);
            if(el) el.innerHTML = "<i>Message deleted</i>";
        });

        function renderContacts(list) {
            const cont = document.getElementById('contact-list');
            list.forEach(c => {
                const d = document.createElement('div');
                d.innerHTML = `<div style="padding:15px; border-bottom:1px solid var(--border); cursor:pointer"><b>${c}</b></div>`;
                d.onclick = () => { activeT = c; document.getElementById('active-title').innerText = c; if(c.includes('Group')) socket.emit('join-group', c); };
                cont.appendChild(d);
            });
        }
    </script>
</body>
</html>
