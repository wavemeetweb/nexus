<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Zenith Ultimate</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0b0e14; --side: #151a21; --p: #6366f1; --card: #1e2430; --text: #e2e8f0; --dim: #64748b; --border: #2a313c; --danger: #ef4444; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* MOBILE NAVIGATION LOGIC */
        #sidebar { width: 340px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        #chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; transition: transform 0.3s ease; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; inset: 0; }
            #chat-main { width: 100%; position: absolute; inset: 0; transform: translateX(100%); z-index: 20; }
            body.in-chat #chat-main { transform: translateX(0); }
            .mobile-only { display: block !important; }
        }
        .mobile-only { display: none; }

        /* VIDEO CALL OVERLAY */
        #call-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 20px; right: 20px; width: 100px; height: 140px; border-radius: 12px; border: 2px solid var(--p); object-fit: cover; }
        .call-btns { position: absolute; bottom: 50px; left: 0; right: 0; display: flex; justify-content: center; gap: 25px; }
        .c-btn { width: 60px; height: 60px; border-radius: 50%; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* MODALS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(8px); }
        .modal { background: var(--card); padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        input, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: white; margin-top: 12px; outline: none; font-size: 16px; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }

        /* CHAT COMPONENTS */
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; position: relative; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--p); color: white; border-bottom-right-radius: 4px; }
        .recv { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; }
        .av { width: 42px; height: 42px; border-radius: 14px; background: var(--p); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0; }
        .status { font-size: 11px; margin-left: 5px; opacity: 0.7; vertical-align: middle; }
        .read { color: #4ade80 !important; }
    </style>
</head>
<body>

    <div id="modal-settings" class="overlay">
        <div class="modal">
            <h2 style="margin-bottom:10px;">Settings</h2>
            <input type="text" id="set-name" placeholder="Display Name">
            <textarea id="set-bio" placeholder="Bio..." rows="3"></textarea>
            <input type="text" id="set-x" placeholder="X (Twitter) Link">
            <input type="text" id="set-yt" placeholder="YouTube Link">
            <input type="text" id="set-ig" placeholder="Instagram Link">
            <button class="btn" style="background:var(--p); color:white" onclick="saveSettings()">Apply Changes</button>
            <button class="btn" style="background:transparent; color:var(--dim)" onclick="closeModals()">Cancel</button>
        </div>
    </div>

    <div id="modal-group" class="overlay">
        <div class="modal">
            <h2>New Group</h2>
            <input type="text" id="grp-name" placeholder="Group Name">
            <div id="grp-friends" style="max-height:180px; overflow-y:auto; margin-top:15px; border:1px solid var(--border); border-radius:12px;"></div>
            <button class="btn" style="background:var(--p); color:white" onclick="submitGroup()">Create Group</button>
            <button class="btn" style="background:transparent; color:var(--dim)" onclick="closeModals()">Cancel</button>
        </div>
    </div>

    <div id="call-screen">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
        <div class="call-btns">
            <button class="c-btn" style="background:var(--danger)" onclick="endCall()"><i data-lucide="phone-off"></i></button>
        </div>
    </div>

    <aside id="sidebar">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="av" id="my-av" style="width:32px; height:32px; font-size:12px;">?</div>
                <b id="my-name" style="font-size:15px;">...</b>
            </div>
            <div style="display: flex; gap: 18px; color: var(--dim);">
                <i data-lucide="user-plus" onclick="sendInvite()" style="cursor:pointer; width:20px;"></i>
                <i data-lucide="users" onclick="openGroup()" style="cursor:pointer; width:20px;"></i>
                <i data-lucide="settings" onclick="openSettings()" style="cursor:pointer; width:20px;"></i>
            </div>
        </div>
        <div id="list-pending"></div>
        <div style="flex:1; overflow-y:auto;" id="list-main"></div>
    </aside>

    <main id="chat-main">
        <header style="height:70px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; justify-content:space-between; background:var(--side);">
            <div style="display:flex; align-items:center;">
                <i data-lucide="arrow-left" class="mobile-only" onclick="document.body.classList.remove('in-chat')" style="margin-right:15px; color:var(--p)"></i>
                <h4 id="active-name">Nexus</h4>
            </div>
            <div id="call-tools" style="display:none; gap:20px; color:var(--p);">
                <i data-lucide="phone" onclick="initCall('voice')" style="cursor:pointer; width:22px;"></i>
                <i data-lucide="video" onclick="initCall('video')" style="cursor:pointer; width:22px;"></i>
            </div>
        </header>
        
        <div id="messages"></div>

        <div style="padding:15px 20px; background:var(--side); display:flex; gap:12px; align-items:center; padding-bottom: calc(15px + env(safe-area-inset-bottom));">
            <label style="cursor:pointer; color:var(--dim)"><i data-lucide="paperclip"></i><input type="file" id="f-in" style="display:none" onchange="fileSel(this)"></label>
            <input type="text" id="msg-in" placeholder="Message..." style="flex:1; margin:0;" onkeypress="if(event.key==='Enter')send()">
            <i data-lucide="send" onclick="send()" style="color:var(--p); cursor:pointer;"></i>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const socket = io('https://nexus-w4w9.onrender.com'); // UPDATE ME
        let myId = "", activeTarget = "", isGroup = false, localFriends = [], pc = null, localStream = null;

        function login() { /* same auth logic */ }

        // SETTINGS & GROUPS
        function openSettings() { document.getElementById('modal-settings').style.display='flex'; }
        function saveSettings() {
            socket.emit('profile-update', {
                name: document.getElementById('set-name').value,
                bio: document.getElementById('set-bio').value,
                socials: { x: document.getElementById('set-x').value, yt: document.getElementById('set-yt').value, ig: document.getElementById('set-ig').value }
            });
            closeModals();
        }

        function openGroup() {
            const el = document.getElementById('grp-friends'); el.innerHTML = "";
            localFriends.forEach(f => {
                el.innerHTML += `<label style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #333;">${f}<input type="checkbox" value="${f}" class="g-sel"></label>`;
            });
            document.getElementById('modal-group').style.display='flex';
        }
        function submitGroup() {
            const name = document.getElementById('grp-name').value;
            const members = Array.from(document.querySelectorAll('.g-sel:checked')).map(c => c.value);
            if(name) { socket.emit('group-make', { name, members }); closeModals(); }
        }

        // VIDEO CALL ENGINE
        async function initCall(type) {
            document.getElementById('call-screen').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: type==='video', audio: true });
            document.getElementById('local-video').srcObject = localStream;
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.onicecandidate = (e) => e.candidate && socket.emit('ice-signal', { to: activeTarget, candidate: e.candidate });
            pc.ontrack = (e) => document.getElementById('remote-video').srcObject = e.streams[0];
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('call-init', { to: activeTarget, type, offer });
        }

        socket.on('call-receive', async ({ from, type, offer }) => {
            if(!confirm(`Call from ${from}. Accept?`)) return;
            activeTarget = from;
            document.getElementById('call-screen').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: type==='video', audio: true });
            document.getElementById('local-video').srcObject = localStream;
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.onicecandidate = (e) => e.candidate && socket.emit('ice-signal', { to: from, candidate: e.candidate });
            pc.ontrack = (e) => document.getElementById('remote-video').srcObject = e.streams[0];
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('call-reply', { to: from, answer });
        });

        socket.on('call-ready', (d) => pc.setRemoteDescription(new RTCSessionDescription(d.answer)));
        socket.on('ice-signal', (d) => pc.addIceCandidate(new RTCIceCandidate(d.candidate)));

        function endCall() {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(pc) pc.close();
            document.getElementById('call-screen').style.display = 'none';
        }

        function closeModals() { document.querySelectorAll('.overlay').forEach(o=>o.style.display='none'); }
        function sendInvite() { const n = prompt("Username:"); if(n) socket.emit('req-send', n); }
        // ... (Render and message logic same as previous version)
    </script>
</body>
</html>
