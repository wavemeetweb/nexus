<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus | Ultimate</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0f172a; --side: #111827; --p: #6366f1; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* UI Blocks */
        #sidebar { width: 320px; background: var(--side); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; }
        #chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* Modals */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal { background: var(--card); padding: 30px; border-radius: 20px; width: 350px; text-align: center; }
        
        /* Video Overlay */
        #call-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .v-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; max-width: 1000px; }
        video { width: 100%; border-radius: 15px; background: #1e293b; transform: scaleX(-1); }
        
        /* Components */
        .user-card { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--p); border: none; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        #msg-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 70%; font-size: 14px; }
        .sent { align-self: flex-end; background: var(--p); }
        .received { align-self: flex-start; background: var(--card); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #0f172a; color: #fff; }
    </style>
</head>
<body>

    <div id="auth-screen" class="overlay" style="display: flex;">
        <div class="modal">
            <h2>NEXUS</h2>
            <input type="text" id="my-name" placeholder="Choose Username...">
            <button onclick="login()" class="btn" style="width: 100%">Enter Nexus</button>
        </div>
    </div>

    <div id="call-screen">
        <div class="v-grid">
            <video id="localVideo" autoplay muted></video>
            <video id="remoteVideo" autoplay></video>
        </div>
        <button onclick="endCall()" class="btn" style="background:var(--danger); margin-top: 20px; padding: 15px 40px;">End Session</button>
    </div>

    <aside id="sidebar">
        <div class="sidebar-header">
            <h3>Nexus</h3>
            <div style="display: flex; gap: 10px;">
                <button onclick="openSearch()" class="btn"><i data-lucide="search"></i></button>
                <button onclick="createGroup()" class="btn"><i data-lucide="users"></i></button>
            </div>
        </div>
        <div id="user-list" class="content-area"></div>
    </aside>

    <main id="chat">
        <div style="padding: 15px; background: var(--side); display: flex; justify-content: space-between; align-items: center;">
            <h4 id="chat-target">Select Contact</h4>
            <div id="call-tools" style="display: none;">
                <button onclick="startCall()" class="btn" style="background:var(--accent)"><i data-lucide="video"></i></button>
            </div>
        </div>
        <div id="msg-history"></div>
        <div style="padding: 20px; background: var(--side); display: flex; gap: 10px;">
            <input type="text" id="msg-in" placeholder="Type..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" class="btn">Send</button>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const socket = io('https://nexus-w4w9.onrender.com'); // UPDATE IF YOU RENAME
        let me = "", currentTarget = "", isGroup = false;
        let pc, localStream;

        function login() {
            me = document.getElementById('my-name').value.trim();
            if(me) { socket.emit('nexus-auth', me); document.getElementById('auth-screen').style.display = 'none'; }
        }

        socket.on('auth-success', (data) => {
            const list = document.getElementById('user-list');
            list.innerHTML = "<h5>Friends</h5>";
            data.friends.forEach(f => {
                const div = document.createElement('div');
                div.className = 'user-card';
                div.innerHTML = `<span>${f}</span>`;
                div.onclick = () => { currentTarget = f; isGroup = false; document.getElementById('chat-target').innerText = f; document.getElementById('call-tools').style.display='block'; };
                list.appendChild(div);
            });
        });

        // --- MESSAGING ---
        function send() {
            const val = document.getElementById('msg-in').value;
            if(!val || !currentTarget) return;
            socket.emit('send-msg', { to: currentTarget, text: val });
            appendMsg('Me', val, 'sent');
            document.getElementById('msg-in').value = "";
        }
        socket.on('receive-msg', (m) => { if(m.from === currentTarget) appendMsg(m.from, m.text, 'received'); });

        function appendMsg(u, t, type) {
            const div = document.createElement('div');
            div.className = `bubble ${type}`;
            div.innerText = t;
            document.getElementById('msg-history').appendChild(div);
            document.getElementById('msg-history').scrollTop = 9999;
        }

        // --- VIDEO CALLS (WebRTC) ---
        async function startCall() {
            document.getElementById('call-screen').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;

            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            
            pc.onicecandidate = e => e.candidate && socket.emit('ice-candidate', { to: currentTarget, candidate: e.candidate });
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('call-offer', { to: currentTarget, offer });
        }

        socket.on('call-offer', async ({ from, offer }) => {
            if(!confirm(`Incoming video from ${from}. Accept?`)) return;
            currentTarget = from;
            document.getElementById('call-screen').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;

            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            
            pc.onicecandidate = e => e.candidate && socket.emit('ice-candidate', { to: from, candidate: e.candidate });
            pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];

            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('call-answer', { to: from, answer });
        });

        socket.on('call-answer', async ({ answer }) => await pc.setRemoteDescription(new RTCSessionDescription(answer)));
        socket.on('ice-candidate', async ({ candidate }) => pc && await pc.addIceCandidate(new RTCIceCandidate(candidate)));

        function endCall() {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(pc) pc.close();
            document.getElementById('call-screen').style.display = 'none';
        }

        // Search logic from previous remains same...
        function openSearch() { const name = prompt("Search username:"); if(name) socket.emit('find-user', name); }
        socket.on('users-found', (list) => { 
            if(confirm("Found " + list[0].username + ". Add?")) socket.emit('send-msg', {to: list[0].username, text: "Hey! Let's chat."}); 
        });
    </script>
</body>
</html>
