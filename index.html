<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus | Calls & Groups</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0f172a; --side: #111827; --p: #6366f1; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; --accent: #10b981; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* UI Styles */
        #sidebar { width: 350px; background: var(--side); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .add-btn { background: var(--p); border: none; color: white; padding: 10px 15px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; }
        
        .content-area { flex: 1; overflow-y: auto; padding: 20px; }
        .user-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--p); display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; }

        /* Call Overlay */
        #call-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .video-container { display: flex; gap: 20px; margin-bottom: 30px; }
        video { width: 400px; height: 300px; background: #000; border-radius: 15px; object-fit: cover; }
        .call-controls { display: flex; gap: 20px; }
        .call-btn { padding: 15px 25px; border-radius: 50px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen" class="overlay" style="display: flex; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal" style="background: var(--card); padding: 30px; border-radius: 20px; width: 350px; text-align: center;">
            <h1>NEXUS</h1>
            <input type="text" id="my-name" placeholder="Enter Username..." style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: var(--bg); color: white;">
            <button onclick="login()" class="add-btn" style="width: 100%; justify-content: center;">Join</button>
        </div>
    </div>

    <div id="call-overlay">
        <div class="video-container">
            <video id="localVideo" autoplay muted></video>
            <video id="remoteVideo" autoplay></video>
        </div>
        <div class="call-controls">
            <button class="call-btn" style="background: var(--danger);" onclick="endCall()">End Call</button>
        </div>
    </div>

    <aside id="sidebar">
        <div class="sidebar-header">
            <h2>Nexus</h2>
            <button class="add-btn" onclick="startCallPrompt()"><i data-lucide="phone"></i></button>
        </div>
        <div id="content" class="content-area"></div>
    </aside>

    <main id="chat">
        </main>

    <script>
        lucide.createIcons();
        const socket = io('https://nexus-w4w9.onrender.com'); // UPDATE THIS
        let me = "";
        let currentFriend = "";
        let peerConnection;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        function login() {
            me = document.getElementById('my-name').value.trim();
            if(!me) return;
            socket.emit('nexus-auth', me);
            document.getElementById('auth-screen').style.display = 'none';
        }

        // --- WEBRTC CALLING LOGIC ---
        async function startCallPrompt() {
            const friend = prompt("Enter username to call:");
            if(!friend) return;
            currentFriend = friend;
            initiateCall();
        }

        async function initiateCall() {
            document.getElementById('call-overlay').style.display = 'flex';
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = stream;

            peerConnection = new RTCPeerConnection(config);
            stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', { to: currentFriend, candidate: event.candidate });
                }
            };

            peerConnection.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('voice-video-offer', { to: currentFriend, offer });
        }

        socket.on('voice-video-offer', async ({ from, offer }) => {
            currentFriend = from;
            if(!confirm(`Incoming call from ${from}. Accept?`)) return;
            
            document.getElementById('call-overlay').style.display = 'flex';
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = stream;

            peerConnection = new RTCPeerConnection(config);
            stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', { to: currentFriend, candidate: event.candidate });
                }
            };
            peerConnection.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('voice-video-answer', { to: currentFriend, answer });
        });

        socket.on('voice-video-answer', async ({ answer }) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        });

        socket.on('ice-candidate', async ({ candidate }) => {
            if(peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        });

        function endCall() {
            if(peerConnection) peerConnection.close();
            document.getElementById('call-overlay').style.display = 'none';
            document.getElementById('localVideo').srcObject.getTracks().forEach(track => track.stop());
        }
    </script>
</body>
</html>
