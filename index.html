<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Secure Matrix</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0d1117; --side: #161b22; --accent: #8957e5; --text: #c9d1d9; --card: #21262d; --danger: #f85149; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; }

        /* Sidebar Architecture */
        #sidebar { width: 340px; background: var(--side); border-right: 1px solid #30363d; display: flex; flex-direction: column; }
        .side-header { padding: 20px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .section-title { font-size: 11px; font-weight: 600; color: #8b949e; text-transform: uppercase; padding: 20px 20px 10px; display: flex; justify-content: space-between; }
        
        .list-container { flex: 1; overflow-y: auto; }
        .list-item { padding: 12px 20px; display: flex; align-items: center; cursor: pointer; border-bottom: 1px solid #21262d; transition: 0.2s; }
        .list-item:hover { background: #1f242c; }
        .list-item.active { background: #262c36; border-left: 3px solid var(--accent); }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Chat Viewport */
        #chat-view { flex: 1; display: flex; flex-direction: column; background: #0d1117; }
        #chat-header { height: 70px; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        #messages { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .bubble { max-width: 60%; padding: 12px 16px; border-radius: 12px; font-size: 15px; position: relative; line-height: 1.4; }
        .bubble.sent { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .bubble.recv { align-self: flex-start; background: var(--card); border-bottom-left-radius: 2px; }
        .sender-name { font-size: 10px; opacity: 0.7; margin-bottom: 4px; display: block; }

        /* Video Call Component */
        #video-modal { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }
        .video-grid { flex: 1; display: flex; gap: 10px; padding: 20px; }
        video { flex: 1; border-radius: 15px; background: #161b22; object-fit: cover; }
        .call-controls { height: 100px; display: flex; justify-content: center; align-items: center; gap: 20px; }

        /* UI Helpers */
        .btn { background: none; border: none; color: #8b949e; cursor: pointer; padding: 5px; }
        .btn:hover { color: white; }
        .action-chip { font-size: 10px; background: var(--accent); color: white; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
        .badge { background: var(--accent); color: white; border-radius: 10px; padding: 1px 6px; font-size: 10px; }
        
        input { background: #161b22; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; outline: none; }
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 20000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div style="text-align: center; width: 300px;">
            <h1 style="color: var(--accent); margin-bottom: 20px;">NEXUS</h1>
            <input type="text" id="auth-name" placeholder="Username..." style="width: 100%; margin-bottom: 10px;">
            <button onclick="initAuth()" style="width:100%; padding: 12px; background: var(--accent); border:none; color:white; border-radius:6px; cursor:pointer;">Initialize</button>
        </div>
    </div>

    <div id="video-modal">
        <div class="video-grid">
            <video id="vLocal" autoplay muted></video>
            <video id="vRemote" autoplay></video>
        </div>
        <div class="call-controls">
            <button onclick="endSession()" style="background:var(--danger); border:none; width:60px; height:60px; border-radius:50%; color:white; cursor:pointer;"><i data-lucide="phone-off"></i></button>
        </div>
    </div>

    <aside id="sidebar">
        <div class="side-header">
            <h2 style="color: var(--accent)">Nexus</h2>
            <div style="display:flex; gap:10px;">
                <button class="btn" onclick="sendReq()"><i data-lucide="user-plus"></i></button>
                <button class="btn" onclick="newGrp()"><i data-lucide="plus-circle"></i></button>
            </div>
        </div>

        <div class="list-container">
            <div class="section-title">Pending <span id="pending-badge" class="badge">0</span></div>
            <div id="pending-list"></div>

            <div class="section-title">Groups</div>
            <div id="group-list"></div>

            <div class="section-title">Direct Messages</div>
            <div id="friend-list"></div>

            <div class="section-title">Blocked</div>
            <div id="blocked-list"></div>
        </div>
    </aside>

    <main id="chat-view">
        <div id="chat-header">
            <div>
                <h3 id="target-name">Secure Portal</h3>
                <small id="target-type" style="color: #8b949e">Select a contact</small>
            </div>
            <div id="call-btn-wrap" style="display: none;">
                <button class="btn" onclick="initiateCall()"><i data-lucide="video"></i></button>
                <button class="btn" onclick="blockUser()" style="color:var(--danger)"><i data-lucide="ban"></i></button>
            </div>
        </div>

        <div id="messages"></div>

        <div style="padding: 20px; display: flex; gap: 10px; background: var(--side);">
            <input type="text" id="msg-input" placeholder="Enter message..." style="flex: 1;" onkeypress="if(event.key==='Enter')broadcast()">
            <button onclick="broadcast()" style="background: var(--accent); border:none; padding: 0 20px; color:white; border-radius:6px; cursor:pointer;"><i data-lucide="send"></i></button>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const socket = io('https://nexus-w4w9.onrender.com'); // UPDATE URL
        let me = "", activeTarget = "", isGroup = false;
        let pc, localStream;

        function initAuth() {
            me = document.getElementById('auth-name').value.trim();
            if(me) { socket.emit('nexus-auth', me); document.getElementById('auth-overlay').style.display = 'none'; }
        }

        // --- UI SYNC ---
        socket.on('ui-state-update', (state) => {
            updateUIList('friend-list', state.friends, 'dm');
            updateUIList('group-list', state.groups, 'group');
            updateUIList('blocked-list', state.blocked, 'blocked');
            
            // Handle Pending specially
            const pList = document.getElementById('pending-list');
            pList.innerHTML = "";
            state.pending.forEach(name => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<div style="flex:1">${name}</div><span class="action-chip" onclick="socket.emit('friend-request-accept','${name}')">Accept</span>`;
                pList.appendChild(div);
            });
            document.getElementById('pending-badge').innerText = state.pending.length;
        });

        function updateUIList(id, items, type) {
            const container = document.getElementById(id);
            container.innerHTML = "";
            items.forEach(item => {
                const name = (typeof item === 'object') ? item.name : item;
                const targetId = (typeof item === 'object') ? item.id : item;
                const div = document.createElement('div');
                div.className = `list-item ${activeTarget === targetId ? 'active' : ''}`;
                div.innerHTML = `<div class="avatar">${name[0].toUpperCase()}</div><span>${name}</span>`;
                div.onclick = () => {
                    activeTarget = targetId;
                    isGroup = (type === 'group');
                    document.getElementById('target-name').innerText = name;
                    document.getElementById('target-type').innerText = isGroup ? 'Public Group' : 'Direct Encryption';
                    document.getElementById('call-btn-wrap').style.display = isGroup ? 'none' : 'flex';
                    document.getElementById('messages').innerHTML = "";
                    lucide.createIcons();
                };
                container.appendChild(div);
            });
        }

        // --- MESSAGING ---
        function broadcast() {
            const val = document.getElementById('msg-input').value;
            if(!val || !activeTarget) return;
            socket.emit('message-outgoing', { to: activeTarget, text: val, type: isGroup ? 'group' : 'dm' });
            if(!isGroup) renderMsg('Me', val, 'sent');
            document.getElementById('msg-input').value = "";
        }

        socket.on('message-incoming', (data) => {
            const valid = isGroup ? (data.channel === activeTarget) : (data.from === activeTarget);
            if(valid) renderMsg(data.from, data.text, 'recv');
        });

        function renderMsg(user, text, style) {
            const div = document.createElement('div');
            div.className = `bubble ${style}`;
            div.innerHTML = `<span class="sender-name">${user}</span>${text}`;
            const box = document.getElementById('messages');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // --- VIDEO CALLS ---
        async function initiateCall() {
            document.getElementById('video-modal').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            document.getElementById('vLocal').srcObject = localStream;
            
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.onicecandidate = e => e.candidate && socket.emit('signal-ice', { to: activeTarget, candidate: e.candidate });
            pc.ontrack = e => document.getElementById('vRemote').srcObject = e.streams[0];

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('signal-offer', { to: activeTarget, offer });
        }

        socket.on('signal-offer', async ({ from, offer }) => {
            if(!confirm(`Incoming call from ${from}. Accept?`)) return;
            activeTarget = from;
            document.getElementById('video-modal').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            document.getElementById('vLocal').srcObject = localStream;
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.onicecandidate = e => e.candidate && socket.emit('signal-ice', { to: from, candidate: e.candidate });
            pc.ontrack = e => document.getElementById('vRemote').srcObject = e.streams[0];
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('signal-answer', { to: from, answer });
        });

        socket.on('signal-answer', async ({ answer }) => pc && await pc.setRemoteDescription(new RTCSessionDescription(answer)));
        socket.on('signal-ice', async ({ candidate }) => pc && await pc.addIceCandidate(new RTCIceCandidate(candidate)));

        function endSession() {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(pc) pc.close();
            document.getElementById('video-modal').style.display = 'none';
        }

        // --- DIALOGS ---
        function sendReq() { const n = prompt("Target Name:"); if(n) socket.emit('friend-request-send', n); }
        function newGrp() { const n = prompt("Group Name:"); if(n) socket.emit('group-create', n); }
        function blockUser() { if(confirm("Block this user?")) socket.emit('user-block', activeTarget); }
        
        socket.on('error-msg', (m) => alert(m));
        socket.on('success-msg', (m) => console.log(m));
    </script>
</body>
</html>
