<!DOCTYPE html>
<html>
<head>
    <title>Zenith Nexus | Virtual School</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --accent: #2563eb; --danger: #ef4444; --bg: #0f172a; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        /* Dashboard/Lobby */
        #lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .box { background: #1e293b; padding: 2rem; border-radius: 12px; text-align: center; }
        input { padding: 12px; width: 250px; border-radius: 6px; border: none; margin: 10px 0; }
        
        /* Meeting Interface */
        #meeting { display: none; height: 100vh; grid-template-columns: 1fr 300px; }
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; padding: 20px; }
        
        /* Sidebar */
        #sidebar { background: #1e293b; border-left: 1px solid #334155; padding: 20px; }
        
        /* Action Bar (Mute, Video, End) */
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
                    background: #1e293b; padding: 15px 30px; border-radius: 50px; display: flex; gap: 20px; }
        .btn { border: none; padding: 12px; border-radius: 50%; cursor: pointer; color: white; font-weight: bold; }
        .btn-mute { background: #475569; }
        .btn-end { background: var(--danger); }
        .active-red { background: var(--danger) !important; }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="box">
            <h1>Zenith Nexus</h1>
            <input type="text" id="u-name" placeholder="Your Name">
            <input type="text" id="r-code" placeholder="Classroom Code">
            <button onclick="enterMeeting()" style="background:var(--accent); color:white; border:none; padding:12px 30px; border-radius:6px; cursor:pointer;">Enter Class</button>
        </div>
    </div>

    <div id="meeting">
        <div id="video-grid">
            <video id="local-video" autoplay muted playsinline style="width:100%; border-radius:10px; background:black;"></video>
        </div>

        <div id="sidebar">
            <h3>Participants</h3>
            <div id="p-list"></div>
        </div>

        <div class="controls">
            <button class="btn btn-mute" id="mic-btn" onclick="toggleMic()">Mic</button>
            <button class="btn btn-mute" id="cam-btn" onclick="toggleCam()">Cam</button>
            <button class="btn btn-end" onclick="endCall()">End Call</button>
        </div>
    </div>

    <script>
        const socket = io();
        let localStream;
        let myUID = "ID-" + Math.random().toString(36).substr(2, 7);

        async function enterMeeting() {
            const name = document.getElementById('u-name').value;
            const room = document.getElementById('r-code').value;
            if(!name || !room) return alert("Fill all fields");

            // Switch UI
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('meeting').style.display = 'grid';

            // Hardware Start
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;

            // Auth & Join
            socket.emit('auth-user', { name, uid: myUID, class: "10", section: "A" });
            socket.emit('join-room', room);
        }

        function toggleMic() {
            const audio = localStream.getAudioTracks()[0];
            audio.enabled = !audio.enabled;
            document.getElementById('mic-btn').classList.toggle('active-red', !audio.enabled);
        }

        function toggleCam() {
            const video = localStream.getVideoTracks()[0];
            video.enabled = !video.enabled;
            document.getElementById('cam-btn').classList.toggle('active-red', !video.enabled);
        }

        function endCall() {
            location.reload();
        }

        socket.on('force-check-ban', (uid) => {
            if(myUID === uid) {
                alert("BANNED BY ADMIN");
                location.href = "about:blank";
            }
        });
    </script>
</body>
</html>
