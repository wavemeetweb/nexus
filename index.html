<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus | Real Friends</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0f172a; --side: #111827; --p: #6366f1; --card: #1e293b; --text: #f8fafc; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar Tabs */
        #sidebar { width: 350px; background: var(--side); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .tabs { display: flex; padding: 20px; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { flex:1; padding: 8px; text-align: center; cursor: pointer; border-radius: 8px; font-size: 12px; background: var(--card); }
        .tab.active { background: var(--p); }

        /* Search & Lists */
        .content-area { flex: 1; overflow-y: auto; padding: 20px; }
        .user-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .btn-s { padding: 5px 12px; border-radius: 6px; border: none; background: var(--p); color: white; cursor: pointer; font-size: 12px; }

        /* Chat Area */
        #chat { flex: 1; display: flex; flex-direction: column; }
        #msg-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px; border-radius: 12px; max-width: 70%; font-size: 14px; }
        .sent { align-self: flex-end; background: var(--p); }
        .received { align-self: flex-start; background: var(--card); }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div style="text-align:center; background:var(--card); padding:40px; border-radius:20px;">
            <h1>NEXUS</h1>
            <input type="text" id="my-name" placeholder="Enter Username" style="display:block; width:100%; margin:20px 0; padding:12px; border-radius:8px; border:none;">
            <button onclick="login()" style="width:100%; padding:12px; border-radius:8px; background:var(--p); color:white; border:none; font-weight:bold;">Enter</button>
        </div>
    </div>

    <aside id="sidebar">
        <div class="tabs">
            <div class="tab active" onclick="showTab('friends')">Friends</div>
            <div class="tab" onclick="showTab('discover')">Discover</div>
            <div class="tab" onclick="showTab('reqs')">Requests <span id="req-count" style="color:red"></span></div>
        </div>

        <div id="content" class="content-area">
            </div>
    </aside>

    <main id="chat">
        <div style="padding:20px; border-bottom:1px solid rgba(255,255,255,0.1)">
            <h3 id="chatting-with">Select a friend</h3>
        </div>
        <div id="msg-history"></div>
        <div style="padding:20px; background:var(--side); display:flex; gap:10px;">
            <input type="text" id="msg-in" placeholder="Message..." style="flex:1; padding:12px; border-radius:8px; border:none; background:var(--bg); color:white;">
            <button onclick="sendMsg()" style="padding:10px 20px; background:var(--p); border:none; border-radius:8px; color:white;">Send</button>
        </div>
    </main>

    <script>
        // CHANGE TO YOUR RENDER URL
        const socket = io('http://localhost:3000'); 
        let me = "";
        let currentFriend = "";
        let data = { friends: [], requests: [] };

        function login() {
            me = document.getElementById('my-name').value;
            if(!me) return;
            socket.emit('nexus-auth', me);
            document.getElementById('auth-screen').style.display = 'none';
            showTab('friends');
        }

        socket.on('auth-success', (res) => {
            data = res;
            updateUI();
        });

        // TABS LOGIC
        function showTab(type) {
            const content = document.getElementById('content');
            content.innerHTML = "";
            
            if(type === 'friends') {
                data.friends.forEach(f => {
                    const div = document.createElement('div');
                    div.className = 'user-card';
                    div.innerHTML = `<span>${f}</span> <button class="btn-s" onclick="startChat('${f}')">Chat</button>`;
                    content.appendChild(div);
                });
            } else if(type === 'discover') {
                content.innerHTML = `<input type="text" id="search-u" placeholder="Find @username..." onkeyup="searchUser(this.value)" style="width:100%; padding:10px; background:var(--bg); border:none; color:white; border-radius:8px; margin-bottom:20px;">
                                    <div id="search-result"></div>`;
            } else if(type === 'reqs') {
                data.requests.forEach(r => {
                    const div = document.createElement('div');
                    div.className = 'user-card';
                    div.innerHTML = `<span>${r}</span> <button class="btn-s" onclick="accept('${r}')">Accept</button>`;
                    content.appendChild(div);
                });
            }
        }

        function searchUser(val) {
            if(val.length > 2) socket.emit('find-user', val);
        }

        socket.on('user-found', (user) => {
            document.getElementById('search-result').innerHTML = `<div class="user-card"><span>${user.username}</span> <button class="btn-s" onclick="addFriend('${user.username}')">Add</button></div>`;
        });

        function addFriend(name) {
            socket.emit('send-friend-request', name);
            alert("Request sent!");
        }

        function accept(name) {
            socket.emit('accept-request', name);
        }

        socket.on('friend-list-update', (newList) => {
            data.friends = newList;
            data.requests = data.requests.filter(item => !newList.includes(item));
            showTab('friends');
            updateUI();
        });

        socket.on('incoming-request', (req) => {
            data.requests.push(req.from);
            updateUI();
        });

        function updateUI() {
            document.getElementById('req-count').innerText = data.requests.length > 0 ? `(${data.requests.length})` : '';
        }

        // CHAT LOGIC
        function startChat(name) {
            currentFriend = name;
            document.getElementById('chatting-with').innerText = `@${name}`;
            document.getElementById('msg-history').innerHTML = "";
        }

        function sendMsg() {
            const text = document.getElementById('msg-in').value;
            if(!text || !currentFriend) return;
            socket.emit('send-msg', { to: currentFriend, text: text });
            document.getElementById('msg-in').value = "";
        }

        socket.on('receive-msg', (m) => {
            if(m.from === currentFriend) appendMsg(m.from, m.text, 'received');
        });

        socket.on('msg-delivered', (m) => {
            appendMsg('Me', m.text, 'sent');
        });

        function appendMsg(user, text, type) {
            const div = document.createElement('div');
            div.className = `bubble ${type}`;
            div.innerHTML = `<strong>${user}:</strong> ${text}`;
            document.getElementById('msg-history').appendChild(div);
            document.getElementById('msg-history').scrollTop = 9999;
        }
    </script>
</body>
</html>
