<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus | Next-Gen Learning</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #6366f1; --accent: #10b981; --bg: #020617; --card: rgba(30, 41, 59, 0.4); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: #f8fafc; overflow-x: hidden; background-image: radial-gradient(circle at 50% -20%, #1e1b4b, transparent); }
        #auth-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero-title { font-size: 5rem; font-weight: 800; background: linear-gradient(to bottom right, #fff, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; letter-spacing: -2px; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
        .btn:disabled { background: #334155; cursor: not-allowed; opacity: 0.5; }
        #dashboard { display: none; padding: 60px 10%; }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 24px; padding: 40px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 class="hero-title">NEXUS</h1>
        <p style="color: #94a3b8; margin-bottom: 30px;">Premium Institutional Communication</p>
        <button id="login-btn" class="btn" style="background:white; color:black; display:flex; align-items:center; gap:10px;" onclick="login()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18"> 
            <span id="btn-text">Continue with Google</span>
        </button>
        <p id="debug-log" style="font-size: 10px; color: #475569; margin-top: 20px;"></p>
    </div>

    <div id="dashboard">
        <h1>Welcome, <span id="user-display" style="color:var(--primary)">...</span></h1>
        <div class="glass">
            <h3>Meeting Control</h3>
            <button class="btn" onclick="startMeeting()">Generate Invite Link</button>
            <div id="link-area" style="display:none; margin-top:20px; color:var(--accent); font-family:monospace;"></div>
        </div>
    </div>

    <script>
        // 1. YOUR CONFIG APPLIED
        const firebaseConfig = {
            apiKey: "AIzaSyBBXlMsVKCVZg7wkw2CjWeetnGkpINV_M4",
            authDomain: "webnexus-cdc47.firebaseapp.com",
            projectId: "webnexus-cdc47",
            storageBucket: "webnexus-cdc47.firebasestorage.app",
            messagingSenderId: "185823698270",
            appId: "1:185823698270:web:b92eb6507a6974e46043cf",
            measurementId: "G-59DS94R3BX"
        };

        // 2. INITIALIZATION
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const socket = io();

        // 3. LOGIN LOGIC
        async function login() {
            const btn = document.getElementById('login-btn');
            const btnText = document.getElementById('btn-text');
            const debug = document.getElementById('debug-log');
            
            btn.disabled = true;
            btnText.innerText = "Connecting...";

            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });

            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                // Check Firestore for user profile
                const doc = await db.collection("students").doc(user.uid).get();
                
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('user-display').innerText = user.displayName;

                socket.emit('auth-user', { name: user.displayName, uid: user.uid });

            } catch (error) {
                btn.disabled = false;
                btnText.innerText = "Continue with Google";
                debug.innerText = "Last Error: " + error.code;
                
                if (error.code === 'auth/popup-blocked') {
                    alert("Please allow popups for this site!");
                } else if (error.code === 'auth/unauthorized-domain') {
                    alert("DOMAIN ERROR: Make sure 'onrender.com' is in Firebase Authorized Domains.");
                } else {
                    alert("Login Failed: " + error.message);
                }
            }
        }

        function startMeeting() {
            const id = Math.random().toString(36).substr(2, 6).toUpperCase();
            const link = window.location.origin + "?room=" + id;
            const area = document.getElementById('link-area');
            area.innerText = "INVITE LINK: " + link;
            area.style.display = 'block';
        }
    </script>
</body>
</html>
