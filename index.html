<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Zenith</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0b0e14; --side: #151a21; --p: #6366f1; --card: #1e2430; --text: #e2e8f0; --dim: #64748b; --border: #2a313c; --danger: #ef4444; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Navigation */
        #sidebar { width: 340px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; z-index: 10; }
        #chat-main { flex: 1; display: flex; flex-direction: column; position: relative; transition: 0.3s; background: var(--bg); }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; inset: 0; }
            #chat-main { width: 100%; position: absolute; inset: 0; transform: translateX(100%); }
            body.in-chat #chat-main { transform: translateX(0); }
            .mobile-only { display: block !important; }
        }
        .mobile-only { display: none; }

        /* Modals */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(10px); }
        .modal { background: var(--card); padding: 25px; border-radius: 24px; width: 92%; max-width: 400px; border: 1px solid var(--border); }
        input, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: white; margin-top: 10px; outline: none; font-size: 16px; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }

        /* Chat UI */
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: var(--p); color: white; border-bottom-right-radius: 4px; }
        .recv { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .status { font-size: 11px; margin-left: 5px; opacity: 0.7; }
        .read { color: #4ade80 !important; }
        .av { width: 40px; height: 40px; border-radius: 12px; background: var(--p); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }

        /* Call Screen */
        #call-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 30px; right: 20px; width: 110px; height: 150px; border-radius: 15px; border: 2px solid var(--p); object-fit: cover; }
    </style>
</head>
<body>

    <div id="modal-auth" class="overlay" style="display: flex;">
        <div class="modal" style="text-align: center;">
            <h1 style="margin-bottom: 20px;">NEXUS</h1>
            <input type="text" id="auth-in" placeholder="Pick a username...">
            <button class="btn" style="background:var(--p); color:white" onclick="login()">Initialize</button>
        </div>
    </div>

    <div id="modal-settings" class="overlay">
        <div class="modal">
            <h3>Profile Settings</h3>
            <input type="text" id="set-name" placeholder="Display Name">
            <textarea id="set-bio" placeholder="Bio..."></textarea>
            <input type="text" id="set-x" placeholder="X Link">
            <input type="text" id="set-yt" placeholder="YouTube Link">
            <input type="text" id="set-ig" placeholder="Instagram Link">
            <button class="btn" style="background:var(--p); color:white" onclick="saveProfile()">Save Changes</button>
            <button class="btn" style="background:transparent; color:var(--dim)" onclick="closeModals()">Close</button>
        </div>
    </div>

    <div id="modal-group" class="overlay">
        <div class="modal">
            <h3>Create Group</h3>
            <input type="text" id="grp-name" placeholder="Group Name">
            <div id="grp-list" style="max-height: 200px; overflow-y:auto; margin-top:15px; border:1px solid var(--border); border-radius:12px;"></div>
            <button class="btn" style="background:var(--p); color:white" onclick="createGroup()">Launch Group</button>
            <button class="btn" style="background:transparent; color:var(--dim)" onclick="closeModals()">Cancel</button>
        </div>
    </div>

    <div id="call-screen">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
        <div style="position: absolute; bottom: 50px; width:100%; display:flex; justify-content:center; gap:30px;">
            <button onclick="endCall()" style="width:65px; height:65px; border-radius:50%; background:var(--danger); border:none; color:white;"><i data-lucide="phone-off"></i></button>
        </div>
    </div>

    <aside id="sidebar">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="av" id="my-av" style="width:32px; height:32px; font-size:12px;">?</div>
                <b id="my-display-name" style="font-size:14px;">...</b>
            </div>
            <div style="display: flex; gap: 15px; color: var(--dim);">
                <i data-lucide="user-plus" onclick="inviteUser()" style="cursor:pointer; width:18px;"></i>
                <i data-lucide="users" onclick="openGroupModal()" style="cursor:pointer; width:18px;"></i>
                <i data-lucide="settings" onclick="openSettings()" style="cursor:pointer; width:18px;"></i>
            </div>
        </div>
        <div id="pending-list"></div>
        <div id="main-list" style="flex:1; overflow-y:auto;"></div>
    </aside>

    <main id="chat-main">
        <header style="height:70px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; justify-content:space-between; background:var(--side);">
            <div style="display:flex; align-items:center;">
                <i data-lucide="arrow-left" class="mobile-only" onclick="document.body.classList.remove('in-chat')" style="margin-right:15px; color:var(--p)"></i>
                <h4 id="active-title">Nexus</h4>
            </div>
            <div id="call-btns" style="display:none; gap:20px; color:var(--p);">
                <i data-lucide="phone" onclick="startCall('voice')" style="cursor:pointer; width:22px;"></i>
                <i data-lucide="video" onclick="startCall('video')" style="cursor:pointer; width:22px;"></i>
            </div>
        </header>
        <div id="messages"></div>
        <div style="padding:15px 20px; background:var(--side); display:flex; gap:12px; align-items:center; padding-bottom: calc(15px + env(safe-area-inset-bottom));">
            <input type="text" id="msg-in" placeholder="Message..." style="flex:1; margin:0;" onkeypress="if(event.key==='Enter')send()">
            <i data-lucide="send" onclick="send()" style="color:var(--p); cursor:pointer;"></i>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const socket = io('https://nexus-w4w9.onrender.com'); // Replace with your Render URL
        let myId = "", activeTarget = "", isGroup = false, localFriends = [], pc = null, localStream = null;

        function login() {
            const n = document.getElementById('auth-in').value.trim();
            if(n) { myId = n; socket.emit('nexus-auth', n); document.getElementById('modal-auth').style.display='none'; }
        }

        socket.on('ui-sync', (data) => {
            localFriends = data.friends;
            document.getElementById('my-display-name').innerText = data.profile.name;
            document.getElementById('my-av').innerText = data.profile.name[0].toUpperCase();
            
            // Sync Settings Inputs
            document.getElementById('set-name').value = data.profile.name;
            document.getElementById('set-bio').value = data.profile.bio;
            
            // Pending Requests
            const pList = document.getElementById('pending-list'); pList.innerHTML = "";
            data.pending.forEach(p => {
                pList.innerHTML += `<div style="padding:10px 15px; background:rgba(99,102,241,0.1); display:flex; justify-content:space-between; align-items:center; font-size:13px;">
                    <span>Request: <b>${p}</b></span>
                    <button onclick="socket.emit('req-accept','${p}')" style="background:var(--p); color:white; border:none; padding:5px 10px; border-radius:6px; cursor:pointer;">Accept</button>
                </div>`;
            });

            // Friends/Groups
            const mList = document.getElementById('main-list'); mList.innerHTML = "";
            const combined = [...data.groups.map(g=>({...g, type:'group'})), ...data.friends.map(f=>({id:f, name:f, type:'dm'}))];
            combined.forEach(item => {
                const d = document.createElement('div');
                d.style.padding = "15px"; d.style.display = "flex"; d.style.alignItems = "center"; d.style.gap = "12px"; d.style.cursor = "pointer";
                if(activeTarget === item.id) d.style.background = "var(--card)";
                d.innerHTML = `<div class="av" style="width:35px; height:35px; font-size:12px;">${item.name[0].toUpperCase()}</div><b>${item.name}</b>`;
                d.onclick = () => {
                    activeTarget = item.id; isGroup = (item.type === 'group');
                    document.getElementById('active-title').innerText = item.name;
                    document.getElementById('call-btns').style.display = isGroup ? 'none' : 'flex';
                    document.body.classList.add('in-chat');
                    document.getElementById('messages').innerHTML = "";
                };
                mList.appendChild(d);
            });
        });

        // Settings
        function openSettings() { document.getElementById('modal-settings').style.display='flex'; }
        function saveProfile() {
            socket.emit('profile-update', {
                name: document.getElementById('set-name').value,
                bio: document.getElementById('set-bio').value,
                socials: { x: document.getElementById('set-x').value, yt: document.getElementById('set-yt').value, ig: document.getElementById('set-ig').value }
            });
            closeModals();
        }

        // Group
        function openGroupModal() {
            const l = document.getElementById('grp-list'); l.innerHTML = "";
            localFriends.forEach(f => {
                l.innerHTML += `<label style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #222;">${f}<input type="checkbox" value="${f}" class="g-chk"></label>`;
            });
            document.getElementById('modal-group').style.display='flex';
        }
        function createGroup() {
            const name = document.getElementById('grp-name').value;
            const members = Array.from(document.querySelectorAll('.g-chk:checked')).map(c => c.value);
            if(name && members.length) { socket.emit('group-make', { name, members }); closeModals(); }
        }

        // Messaging
        function send() {
            const text = document.getElementById('msg-in').value;
            if(text && activeTarget) {
                socket.emit('msg-out', { to: activeTarget, text, type: isGroup ? 'group' : 'dm' });
                renderMsg('Me', text, 'sent', 'waiting');
                document.getElementById('msg-in').value = "";
            }
        }
        socket.on('msg-in', (d) => {
            if(isGroup ? d.channel === activeTarget : d.fromSlug === activeTarget.toLowerCase()) {
                renderMsg(d.from, d.text, 'recv', d.id);
                if(!isGroup) socket.emit('msg-read', { mId: d.id, toSlug: d.fromSlug });
            }
        });
        function renderMsg(s, t, side, mid) {
            const d = document.createElement('div'); d.className = `bubble ${side}`; d.setAttribute('data-id', mid);
            d.innerHTML = `<small style="display:block; opacity:0.6; font-size:10px;">${s}</small>${t}<span class="status">${side==='sent'?'✓':''}</span>`;
            document.getElementById('messages').appendChild(d);
            document.getElementById('messages').scrollTop = 99999;
        }

        // WebRTC Calls
        async function startCall(type) {
            document.getElementById('call-screen').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: type==='video', audio: true });
            document.getElementById('local-video').srcObject = localStream;
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.onicecandidate = (e) => e.candidate && socket.emit('ice-signal', { to: activeTarget, candidate: e.candidate });
            pc.ontrack = (e) => document.getElementById('remote-video').srcObject = e.streams[0];
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('call-init', { to: activeTarget, type, offer });
        }
        socket.on('call-receive', async (d) => {
            if(!confirm(`Call from ${d.from}. Accept?`)) return;
            activeTarget = d.from; document.getElementById('call-screen').style.display='flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: d.type==='video', audio: true });
            document.getElementById('local-video').srcObject = localStream;
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.onicecandidate = (e) => e.candidate && socket.emit('ice-signal', { to: d.from, candidate: e.candidate });
            pc.ontrack = (e) => document.getElementById('remote-video').srcObject = e.streams[0];
            await pc.setRemoteDescription(new RTCSessionDescription(d.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('call-reply', { to: d.from, answer });
        });
        socket.on('call-ready', (d) => pc.setRemoteDescription(new RTCSessionDescription(d.answer)));
        socket.on('ice-signal', (d) => pc.addIceCandidate(new RTCIceCandidate(d.candidate)));
        function endCall() { if(localStream) localStream.getTracks().forEach(t=>t.stop()); document.getElementById('call-screen').style.display='none'; if(pc) pc.close(); }

        function closeModals() { document.querySelectorAll('.overlay').forEach(o=>o.style.display='none'); }
        function inviteUser() { const n = prompt("Username:"); if(n) socket.emit('req-send', n); }
        socket.on('msg-status', (d) => {
            const s = document.querySelector(`[data-id="${d.id}"] .status`);
            if(s) { s.innerText = '✓✓'; if(d.status==='read') s.classList.add('read'); }
        });
    </script>
</body>
</html>
