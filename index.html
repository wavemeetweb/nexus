<!DOCTYPE html>
<html>
<head>
    <title>Zenith Nexus | Online Class</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0b0d11; --accent: #2563eb; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .hidden { display: none; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; background: var(--accent); color: white; }
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; padding: 20px; }
    </style>
</head>
<body>

    <div id="setup-view" style="padding: 50px; text-align: center;">
        <h2>Nexus Profile Setup</h2>
        <input type="text" id="u-name" placeholder="Full Name"><br><br>
        <input type="text" id="u-class" placeholder="Class (e.g. 10)"><br><br>
        <input type="text" id="u-sec" placeholder="Section (e.g. B)"><br><br>
        <button class="btn" onclick="goDashboard()">Enter Dashboard</button>
    </div>

    <div id="dash-view" class="hidden" style="padding: 50px; text-align: center;">
        <h1 id="welcome">Welcome</h1>
        <div style="display: flex; justify-content: center; gap: 20px;">
            <button class="btn" onclick="startClass()">Start Instant Meeting</button>
            <button class="btn" style="background:#333;" onclick="joinClass()">Join with ID</button>
        </div>
    </div>

    <div id="class-view" class="hidden">
        <div id="video-grid">
             <video id="myCam" autoplay muted style="width:100%; border-radius:10px; background:#000;"></video>
        </div>
        </div>

    <script>
        const socket = io();
        let myProfile = {};

        function goDashboard() {
            myProfile = { 
                name: document.getElementById('u-name').value, 
                class: document.getElementById('u-class').value, 
                section: document.getElementById('u-sec').value,
                uid: 'ID-' + Math.random().toString(36).substr(2, 9)
            };
            document.getElementById('welcome').innerText = `Hi, ${myProfile.name}`;
            toggleView('dash-view');
            socket.emit('auth-user', myProfile);
        }

        function toggleView(id) {
            ['setup-view', 'dash-view', 'class-view'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function startClass() {
            toggleView('class-view');
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('myCam').srcObject = stream;
        }

        socket.on('kick-notice', (msg) => { if(msg === "BANNED_GLOBALLY") { alert("You are banned."); location.reload(); }});
    </script>
</body>
</html>
