<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Zenith Prime</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <style>
        :root { --bg: #0b0e14; --side: #151a21; --p: #6366f1; --card: #1e2430; --text: #e2e8f0; --dim: #64748b; --border: #2a313c; --danger: #ef4444; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        #sidebar { width: 320px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 380px; border: 1px solid var(--border); }
        
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: white; outline: none; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .btn-p { background: var(--p); color: white; }

        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px; border-radius: 15px; max-width: 70%; position: relative; cursor: context-menu; }
        .sent { align-self: flex-end; background: var(--p); border-bottom-right-radius: 2px; }
        .recv { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        
        #ctx-menu { position: fixed; background: var(--card); border: 1px solid var(--border); border-radius: 10px; display: none; z-index: 2000; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #ctx-menu button { display: block; width: 100%; padding: 10px 20px; background: none; border: none; color: white; text-align: left; cursor: pointer; font-size: 13px; }
        #ctx-menu button:hover { background: var(--p); }

        .deleted { opacity: 0.5; font-style: italic; font-size: 12px; }
    </style>
</head>
<body>

    <div id="modal-settings" class="overlay">
        <div class="modal">
            <h3>Profile Settings</h3>
            <input id="set-display" placeholder="Display Name">
            <textarea id="set-bio" placeholder="Bio"></textarea>
            <input id="set-ig" placeholder="Instagram URL">
            <button class="btn btn-p" style="width:100%; margin-top:15px;" onclick="saveProfile()">Save</button>
            <button class="btn" style="width:100%; margin-top:5px; background:none; color:var(--dim)" onclick="closeModals()">Cancel</button>
        </div>
    </div>

    <div id="modal-profile" class="overlay">
        <div class="modal" id="profile-view"></div>
    </div>

    <aside id="sidebar">
        <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <b>NEXUS</b>
            <div style="display:flex; gap:15px; color:var(--dim)">
                <i data-lucide="settings" onclick="openSettings()" style="cursor:pointer"></i>
                <i data-lucide="user-plus" onclick="sendReq()" style="cursor:pointer"></i>
                <i data-lucide="users" onclick="createGrp()" style="cursor:pointer"></i>
            </div>
        </div>
        <div id="req-ui" style="display:none; padding:10px; background:var(--p); color:white; font-size:12px; display:flex; justify-content:space-between; align-items:center;">
            <span id="req-txt"></span>
            <button onclick="acceptReq()" style="background:white; border:none; padding:2px 8px; border-radius:5px; font-size:10px;">Accept</button>
        </div>
        <div id="list" style="flex:1; overflow-y:auto;"></div>
    </aside>

    <main id="chat-main">
        <header style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--side);">
            <h4 id="chat-title" onclick="viewProfile()" style="cursor:pointer">Select a Chat</h4>
            <div id="admin-ui" style="display:none; gap:15px; color:var(--p)">
                <i data-lucide="user-plus" onclick="addToGrp()" style="cursor:pointer"></i>
                <i data-lucide="trash-2" onclick="delGrp()" style="color:var(--danger); cursor:pointer"></i>
            </div>
        </header>
        <div id="messages"></div>
        <div style="padding:15px; display:flex; gap:10px; background:var(--side);">
            <label style="cursor:pointer; color:var(--dim)"><i data-lucide="paperclip"></i><input type="file" style="display:none" onchange="sendFile(this)"></label>
            <input type="text" id="m-in" placeholder="Message..." style="margin:0" onkeypress="if(event.key==='Enter')sendMsg()">
            <i data-lucide="mic" id="mic" onclick="record()" style="cursor:pointer; color:var(--dim)"></i>
            <button class="btn btn-p" onclick="sendMsg()"><i data-lucide="send"></i></button>
        </div>
    </main>

    <div id="ctx-menu">
        <button onclick="delMsg('me')">Delete for me</button>
        <button id="del-all" style="color:var(--danger)" onclick="delMsg('everyone')">Delete for everyone</button>
    </div>

    <script>
        lucide.createIcons();
        localforage.config({ name: 'Nexus2026' });
        const socket = io();
        let myUser = "", activeTarget = "", isGrp = false, selMsgId = null, reqFrom = "";

        // Init
        window.onload = () => {
            myUser = prompt("Username:").toLowerCase().trim();
            socket.emit('nexus-auth', myUser);
        };

        socket.on('auth-confirmed', (d) => { renderSidebar(); });

        // Sidebar & Friends
        async function renderSidebar() {
            const f = (await localforage.getItem('friends')) || [];
            const g = (await localforage.getItem('groups')) || {};
            const list = document.getElementById('list'); list.innerHTML = "";

            Object.values(g).forEach(group => {
                const d = document.createElement('div'); d.style.padding="15px"; d.style.borderBottom="1px solid var(--border)"; d.style.cursor="pointer";
                d.innerHTML = `<small style="color:var(--p)">GROUP</small><br><b>${group.name}</b>`;
                d.onclick = () => { activeTarget = group.id; isGrp = true; openChat(group.name, group.admin); };
                list.appendChild(d);
            });

            f.forEach(name => {
                const d = document.createElement('div'); d.style.padding="15px"; d.style.borderBottom="1px solid var(--border)"; d.style.cursor="pointer";
                d.innerHTML = `<b>${name}</b>`;
                d.onclick = () => { activeTarget = name; isGrp = false; openChat(name); };
                list.appendChild(d);
            });
        }

        // Requests
        function sendReq() { const t = prompt("Username:"); if(t) socket.emit('friend-req-send', t); }
        socket.on('friend-req-recv', d => { reqFrom = d.from; document.getElementById('req-ui').style.display='flex'; document.getElementById('req-txt').innerText = `From: ${d.from}`; });
        async function acceptReq() {
            socket.emit('friend-req-accept', reqFrom);
            document.getElementById('req-ui').style.display='none';
            await saveFriend(reqFrom);
        }
        socket.on('friend-req-confirmed', d => saveFriend(d.user));
        async function saveFriend(name) {
            const f = (await localforage.getItem('friends')) || [];
            if(!f.includes(name)) { f.push(name); await localforage.setItem('friends', f); renderSidebar(); }
        }

        // Messaging
        async function sendMsg() {
            const text = document.getElementById('m-in').value; if(!text || !activeTarget) return;
            const msg = { id: Date.now(), from: myUser, text, side: 'sent' };
            if(isGrp) socket.emit('group-msg', { groupId: activeTarget, text, id: msg.id });
            else socket.emit('msg-out', { to: activeTarget, text, id: msg.id });
            await storeMsg(activeTarget, msg);
            renderBubble(msg);
            document.getElementById('m-in').value = "";
        }

        socket.on('msg-in', async d => {
            const channel = d.groupId || d.from;
            const msg = { ...d, side: 'recv' };
            await storeMsg(channel, msg);
            if(activeTarget === channel) renderBubble(msg);
        });

        async function storeMsg(id, m) {
            const h = (await localforage.getItem(`chat_${id}`)) || [];
            h.push(m); await localforage.setItem(`chat_${id}`, h);
        }

        function renderBubble(m) {
            const b = document.createElement('div'); b.className = `bubble ${m.side}`; b.id = `m_${m.id}`;
            b.innerHTML = m.deleted ? `<span class="deleted">Message deleted</span>` : `<small style="display:block;opacity:0.5;font-size:10px">${m.from}</small>${m.text}`;
            
            b.oncontextmenu = (e) => {
                e.preventDefault(); selMsgId = m.id;
                const menu = document.getElementById('ctx-menu'); menu.style.display='block';
                menu.style.top = e.pageY+'px'; menu.style.left = e.pageX+'px';
                const canDelAll = (m.from === myUser || (isGrp && activeTarget && (async () => {
                    const g = await localforage.getItem('groups'); return g[activeTarget]?.admin === myUser;
                })()));
                document.getElementById('del-all').style.display = 'block'; 
            };
            document.getElementById('messages').appendChild(b);
            document.getElementById('messages').scrollTop = 99999;
        }

        // Deletion
        async function delMsg(mode) {
            if(mode === 'everyone') socket.emit('msg-delete', { msgId: selMsgId, targetId: activeTarget, isGroup: isGrp });
            await localDelete(activeTarget, selMsgId, mode === 'everyone');
            openChat(document.getElementById('chat-title').innerText);
        }

        socket.on('msg-deleted', async d => {
            await localDelete(d.targetId === myUser ? d.by : d.targetId, d.msgId, true);
            if(activeTarget === d.targetId || activeTarget === d.by) openChat(document.getElementById('chat-title').innerText);
        });

        async function localDelete(chatId, mid, everyone) {
            const h = (await localforage.getItem(`chat_${chatId}`)) || [];
            const up = h.map(m => m.id == mid ? (everyone ? {...m, text:"", deleted:true} : null) : m).filter(m => m);
            await localforage.setItem(`chat_${chatId}`, up);
        }

        // Groups
        function createGrp() { const n = prompt("Group Name:"); if(n) socket.emit('group-create', { name: n }); }
        socket.on('group-init', async g => {
            const grps = (await localforage.getItem('groups')) || {};
            grps[g.id] = g; await localforage.setItem('groups', grps); renderSidebar();
        });

        // Profiles
        function openSettings() { document.getElementById('modal-settings').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); }
        function saveProfile() {
            socket.emit('update-profile', { display: document.getElementById('set-display').value, bio: document.getElementById('set-bio').value });
            closeModals();
        }
        function viewProfile() { if(!isGrp) socket.emit('get-profile', activeTarget); }
        socket.on('profile-data', d => {
            document.getElementById('profile-view').innerHTML = `<h3>${d.display}</h3><p>${d.bio}</p><button class="btn" style="background:var(--danger);color:white;width:100%;margin-top:20px;" onclick="remFriend('${d.user}')">Remove Friend</button>`;
            document.getElementById('modal-profile').style.display='flex';
        });

        async function remFriend(n) {
            const f = (await localforage.getItem('friends')) || [];
            await localforage.setItem('friends', f.filter(x => x !== n));
            location.reload();
        }

        async function openChat(t, admin = null) {
            document.getElementById('chat-title').innerText = t;
            document.getElementById('admin-ui').style.display = (admin === myUser) ? 'flex' : 'none';
            document.getElementById('messages').innerHTML = "";
            const h = (await localforage.getItem(`chat_${activeTarget}`)) || [];
            h.forEach(renderBubble);
        }

        window.onclick = () => document.getElementById('ctx-menu').style.display='none';
    </script>
</body>
</html>
