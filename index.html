<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Global Network</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg: #0b0e14; --side: #151921; --p: #7c3aed; --card: #1e2530; 
            --text: #e2e8f0; --dim: #94a3b8; --danger: #ef4444; --accent: #10b981;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; }

        /* SIDEBAR NAVIGATION */
        #nav-sidebar { width: 320px; background: var(--side); border-right: 1px solid #2d3748; display: flex; flex-direction: column; }
        .nav-header { padding: 20px; border-bottom: 1px solid #2d3748; display: flex; justify-content: space-between; align-items: center; }
        .section-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; padding: 15px 20px 5px; }
        
        /* CONTENT SCROLLING */
        .scroller { flex: 1; overflow-y: auto; }
        .item-row { padding: 12px 20px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #1a202c; }
        .item-row:hover { background: #1f2733; }
        .item-row.active { border-left: 4px solid var(--p); background: #1f2733; }
        .avatar { width: 40px; height: 40px; border-radius: 12px; background: var(--p); display: flex; align-items: center; justify-content: center; margin-right: 12px; font-weight: bold; }

        /* CHAT INTERFACE */
        #main-chat { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        #chat-header { height: 70px; padding: 0 25px; display: flex; align-items: center; justify-content: space-between; background: var(--side); border-bottom: 1px solid #2d3748; }
        #msg-view { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { padding: 12px 18px; border-radius: 18px; max-width: 65%; line-height: 1.5; font-size: 15px; position: relative; }
        .msg-sent { align-self: flex-end; background: var(--p); border-bottom-right-radius: 4px; }
        .msg-recv { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; }
        .msg-meta { font-size: 10px; color: var(--dim); margin-top: 5px; }

        /* CALL OVERLAY */
        #call-ui { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .v-container { display: flex; gap: 15px; width: 95%; max-width: 1200px; height: 70%; }
        video { flex: 1; border-radius: 20px; background: #111; object-fit: cover; }
        .call-bar { margin-top: 30px; display: flex; gap: 20px; }

        /* MODALS & INPUTS */
        .btn-icon { background: none; border: none; color: var(--dim); cursor: pointer; transition: 0.2s; }
        .btn-icon:hover { color: #fff; transform: scale(1.1); }
        .action-btn { background: var(--p); border: none; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        input[type="text"] { background: var(--card); border: 1px solid #2d3748; color: #fff; padding: 12px; border-radius: 10px; outline: none; }
        
        .badge { background: var(--danger); font-size: 10px; padding: 2px 6px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="auth-modal" style="position:fixed; inset:0; background:var(--bg); z-index:9000; display:flex; align-items:center; justify-content:center;">
        <div style="text-align:center; width: 350px;">
            <h1 style="font-size: 3rem; margin-bottom: 20px; color: var(--p);">NEXUS</h1>
            <input type="text" id="username-in" placeholder="Identity Name..." style="width: 100%; margin-bottom: 15px;">
            <button onclick="doAuth()" class="action-btn" style="width: 100%;">Initialize Connection</button>
        </div>
    </div>

    <div id="call-ui">
        <div class="v-container">
            <video id="localVid" autoplay muted></video>
            <video id="remoteVid" autoplay></video>
        </div>
        <div class="call-bar">
            <button onclick="hangup()" class="action-btn" style="background:var(--danger); border-radius: 50%; padding: 20px;"><i data-lucide="phone-off"></i></button>
        </div>
    </div>

    <nav id="nav-sidebar">
        <div class="nav-header">
            <h2 style="color:var(--p)">Nexus</h2>
            <div style="display:flex; gap:10px;">
                <button class="btn-icon" onclick="reqFriend()"><i data-lucide="user-plus"></i></button>
                <button class="btn-icon" onclick="makeGrp()"><i data-lucide="plus-square"></i></button>
            </div>
        </div>
        
        <div class="scroller" id="nav-scroller">
            <div class="section-label">Pending Requests <span id="pending-count" class="badge">0</span></div>
            <div id="list-pending"></div>

            <div class="section-label">Groups</div>
            <div id="list-groups"></div>

            <div class="section-label">Direct Messages</div>
            <div id="list-friends"></div>

            <div class="section-label">Restricted</div>
            <div id="list-blocked"></div>
        </div>
    </nav>

    <main id="main-chat">
        <div id="chat-header">
            <div id="active-info">
                <h3 id="target-display">Welcome to Nexus</h3>
                <small id="target-status" style="color: var(--dim);">Select a connection to start</small>
            </div>
            <div id="chat-actions" style="display:none;">
                <button class="btn-icon" onclick="startCall()"><i data-lucide="video"></i></button>
                <button class="btn-icon" style="color:var(--danger)" onclick="blockActive()"><i data-lucide="slash"></i></button>
            </div>
        </div>

        <div id="msg-view"></div>

        <div style="padding: 20px; background: var(--side); display: flex; gap: 15px;">
            <input type="text" id="chat-input" placeholder="Secure message..." style="flex: 1;" onkeypress="if(event.key==='Enter')sendMsg()">
            <button class="action-btn" onclick="sendMsg()"><i data-lucide="send"></i></button>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const socket = io('https://nexus-w4w9.onrender.com'); // UPDATE URL IF NEEDED
        let myUser = "", currentTarget = "", isGroup = false;
        let pc, localStream;

        function doAuth() {
            myUser = document.getElementById('username-in').value.trim();
            if(myUser) {
                socket.emit('nexus-auth', myUser);
                document.getElementById('auth-modal').style.display = 'none';
            }
        }

        // --- STATE SYNC ---
        socket.on('sync-state', (state) => {
            renderList('list-friends', state.friends, 'user');
            renderList('list-pending', state.pending, 'pending');
            renderList('list-blocked', state.blocked, 'blocked');
            renderList('list-groups', state.groups, 'group');
            document.getElementById('pending-count').innerText = state.pending.length;
        });

        function renderList(elementId, items, type) {
            const container = document.getElementById(elementId);
            container.innerHTML = "";
            items.forEach(item => {
                const name = typeof item === 'object' ? item.name : item;
                const id = typeof item === 'object' ? item.id : item;
                
                const div = document.createElement('div');
                div.className = 'item-row';
                div.innerHTML = `
                    <div class="avatar">${name[0].toUpperCase()}</div>
                    <div style="flex:1">
                        <div>${name}</div>
                        <small style="color:var(--dim)">${type}</small>
                    </div>
                `;
                
                if(type === 'pending') {
                    div.innerHTML += `<button class="action-btn" style="padding:5px 10px; font-size:12px" onclick="socket.emit('accept-friend','${name}')">Accept</button>`;
                } else {
                    div.onclick = () => selectChat(id, name, type === 'group');
                }
                container.appendChild(div);
            });
        }

        function selectChat(id, name, groupMode) {
            currentTarget = id;
            isGroup = groupMode;
            document.getElementById('target-display').innerText = name;
            document.getElementById('target-status').innerText = groupMode ? 'Group Chat' : 'Encrypted Peer Connection';
            document.getElementById('chat-actions').style.display = groupMode ? 'none' : 'flex';
            document.getElementById('msg-view').innerHTML = "";
        }

        // --- MESSAGING ---
        function sendMsg() {
            const text = document.getElementById('chat-input').value;
            if(!text || !currentTarget) return;
            socket.emit('send-msg', { to: currentTarget, text, isGroupMsg: isGroup });
            appendMsg('Me', text, 'msg-sent');
            document.getElementById('chat-input').value = "";
        }

        socket.on('receive-msg', (data) => {
            const isMatch = isGroup ? (data.groupId === currentTarget) : (data.from === currentTarget);
            if(isMatch) appendMsg(data.from, data.text, 'msg-recv');
        });

        function appendMsg(sender, text, style) {
            const div = document.createElement('div');
            div.className = `msg-bubble ${style}`;
            div.innerHTML = `
                <div style="font-weight:bold; font-size:11px; margin-bottom:4px;">${sender}</div>
                <div>${text}</div>
                <div class="msg-meta">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
            `;
            const view = document.getElementById('msg-view');
            view.appendChild(div);
            view.scrollTop = view.scrollHeight;
        }

        // --- WEBRTC CALLING ---
        async function startCall() {
            document.getElementById('call-ui').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVid').srcObject = localStream;

            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = e => e.candidate && socket.emit('signal-ice', { to: currentTarget, candidate: e.candidate });
            pc.ontrack = e => document.getElementById('remoteVid').srcObject = e.streams[0];

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('signal-offer', { to: currentTarget, offer });
        }

        socket.on('signal-offer', async ({ from, offer }) => {
            if(!confirm(`Call from ${from}. Accept?`)) return;
            currentTarget = from;
            document.getElementById('call-ui').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVid').srcObject = localStream;

            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.onicecandidate = e => e.candidate && socket.emit('signal-ice', { to: from, candidate: e.candidate });
            pc.ontrack = e => document.getElementById('remoteVid').srcObject = e.streams[0];

            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('signal-answer', { to: from, answer });
        });

        socket.on('signal-answer', async ({ answer }) => await pc.setRemoteDescription(new RTCSessionDescription(answer)));
        socket.on('signal-ice', async ({ candidate }) => pc && await pc.addIceCandidate(new RTCIceCandidate(candidate)));

        function hangup() {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(pc) pc.close();
            document.getElementById('call-ui').style.display = 'none';
        }

        // --- HELPERS ---
        function reqFriend() { const n = prompt("Target Username:"); if(n) socket.emit('send-friend-request', n); }
        function makeGrp() { const n = prompt("Group Name:"); if(n) socket.emit('create-group', n); }
        function blockActive() { if(confirm(`Block ${currentTarget}?`)) socket.emit('block-user', currentTarget); }
    </script>
</body>
</html>
