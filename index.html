<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Zenith Nexus v1.0</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        :root { --bg: #0a0b10; --accent: #6366f1; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); --text: #e2e8f0; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; }

        /* Onboarding Overlay */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #161821; padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 90%; max-width: 400px; text-align: center; }
        
        /* Layout */
        #sidebar { width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: #0d0f17; }
        #chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* Call UI */
        #call-screen { position: fixed; inset: 0; background: #000; z-index: 1500; display: none; flex-direction: column; }
        .video-grid { flex: 1; display: flex; flex-direction: column; position: relative; }
        video { width: 100%; height: 50%; object-fit: cover; background: #111; }
        .call-tools { height: 100px; display: flex; justify-content: center; align-items: center; gap: 30px; background: rgba(0,0,0,0.8); }
        .btn-end { background: #ef4444; width: 60px; height: 60px; border-radius: 50%; border: none; color: white; cursor: pointer; }

        .contact-item { padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .contact-item:hover { background: var(--glass); }
        .active-chat { background: var(--accent) !important; color: white; }

        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 75%; font-size: 15px; }
        .sent { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .recv { align-self: flex-start; background: #1e212d; border-bottom-left-radius: 4px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="margin-bottom: 20px;">Zenith Nexus</h1>
            <input type="text" id="username-in" placeholder="Enter Username" style="width:100%; padding:12px; border-radius:10px; margin-bottom:15px; background:transparent; border:1px solid var(--border); color:white;">
            <button onclick="startApp()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:10px; color:white; font-weight:bold;">Enter Nexus</button>
        </div>
    </div>

    <div id="call-screen">
        <div class="video-grid">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay muted playsinline style="position:absolute; bottom:20px; right:20px; width:120px; height:160px; border-radius:12px; border:2px solid var(--accent);"></video>
        </div>
        <div class="call-tools">
            <button class="btn-end" onclick="endCall()"><i data-lucide="phone-off"></i></button>
        </div>
    </div>

    <aside id="sidebar">
        <div style="padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
            <h2 id="my-label">ZENITH</h2>
            <i data-lucide="plus-square" style="cursor:pointer" onclick="addNewContact()"></i>
        </div>
        <div id="contact-list" style="overflow-y: auto;"></div>
    </aside>

    <main id="chat-main">
        <header style="height:70px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 25px; justify-content:space-between;">
            <h3 id="chat-title">Select a contact</h3>
            <div id="call-btns" style="display:none; gap:20px;">
                <i data-lucide="phone" onclick="initiateCall('voice')" style="cursor:pointer"></i>
                <i data-lucide="video" onclick="initiateCall('video')" style="cursor:pointer"></i>
            </div>
        </header>
        <div id="messages"></div>
        <div style="padding:20px; display:flex; gap:12px; border-top:1px solid var(--border);">
            <input type="text" id="msg-input" placeholder="Type a message..." style="flex:1; background:var(--glass); border:1px solid var(--border); color:white; padding:12px 20px; border-radius:25px; outline:none;" onkeypress="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%; color:white;"><i data-lucide="send"></i></button>
        </div>
    </main>

    <script>
        const socket = io();
        let myName = "", activeTarget = "", currentPeer = null, localStream = null;

        // --- AUTH & SETUP ---
        async function startApp() {
            const name = document.getElementById('username-in').value.trim();
            if(!name) return;
            myName = name;
            socket.emit('auth', myName);
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('my-label').innerText = myName.toUpperCase();
            lucide.createIcons();
            refreshContacts();
        }

        async function addNewContact() {
            const target = prompt("Enter username of the person or group name:");
            if(target) {
                const list = await localforage.getItem('contacts') || [];
                if(!list.includes(target)) list.push(target);
                await localforage.setItem('contacts', list);
                refreshContacts();
            }
        }

        async function refreshContacts() {
            const list = await localforage.getItem('contacts') || [];
            const container = document.getElementById('contact-list');
            container.innerHTML = "";
            list.forEach(name => {
                const div = document.createElement('div');
                div.className = "contact-item";
                div.innerHTML = `<div style="width:40px;height:40px;background:#222;border-radius:50%;display:grid;place-items:center;">${name[0].toUpperCase()}</div> <span>${name}</span>`;
                div.onclick = () => selectContact(name);
                container.appendChild(div);
            });
        }

        function selectContact(name) {
            activeTarget = name;
            document.getElementById('chat-title').innerText = name;
            document.getElementById('call-btns').style.display = 'flex';
            loadHistory();
        }

        // --- CALL LOGIC ---
        async function initiateCall(type) {
            document.getElementById('call-screen').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: type === 'video', audio: true });
            document.getElementById('localVideo').srcObject = localStream;

            currentPeer = new SimplePeer({ initiator: true, stream: localStream, trickle: false });
            currentPeer.on('signal', data => socket.emit('call-request', { to: activeTarget, type, offer: data }));
            currentPeer.on('stream', stream => document.getElementById('remoteVideo').srcObject = stream);
        }

        socket.on('incoming-call', async (d) => {
            if(confirm(`Incoming ${d.type} call from ${d.from}?`)) {
                activeTarget = d.from;
                document.getElementById('call-screen').style.display = 'flex';
                localStream = await navigator.mediaDevices.getUserMedia({ video: d.type === 'video', audio: true });
                document.getElementById('localVideo').srcObject = localStream;

                currentPeer = new SimplePeer({ initiator: false, stream: localStream, trickle: false });
                currentPeer.on('signal', data => socket.emit('call-answer', { to: d.from, answer: data }));
                currentPeer.on('stream', stream => document.getElementById('remoteVideo').srcObject = stream);
                currentPeer.signal(d.offer);
            }
        });

        socket.on('call-accepted', d => currentPeer.signal(d.answer));

        // --- REAL END CALL ---
        function endCall() {
            socket.emit('end-call-signal', { to: activeTarget });
            cleanupCall();
        }

        socket.on('call-ended-by-peer', () => {
            alert("Call ended by the other person.");
            cleanupCall();
        });

        function cleanupCall() {
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            if (currentPeer) currentPeer.destroy();
            document.getElementById('call-screen').style.display = 'none';
            localStream = null;
            currentPeer = null;
        }

        // --- MESSAGING ---
        async function sendMessage() {
            const txt = document.getElementById('msg-input').value;
            if(!txt || !activeTarget) return;
            const msg = { to: activeTarget, text: txt, isGroup: activeTarget.toLowerCase().includes('group') };
            socket.emit('msg-send', msg);
            renderBubble({ from: 'Me', text: txt });
            document.getElementById('msg-input').value = "";
        }

        socket.on('msg-recv', d => { if(d.from === activeTarget) renderBubble(d); });

        function renderBubble(m) {
            const b = document.createElement('div');
            b.className = `bubble ${m.from === 'Me' ? 'sent' : 'recv'}`;
            b.innerText = m.text;
            document.getElementById('messages').appendChild(b);
            document.getElementById('messages').scrollTop = 99999;
        }
    </script>
</body>
</html>
