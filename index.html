<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Premium Communication</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- NEXUS DESIGN SYSTEM (600+ lines of CSS logic compressed) --- */
        :root {
            --primary: #6366f1; --primary-hover: #4f46e5;
            --bg: #0f172a; --side: #111827; --card: #1e293b;
            --text-p: #f8fafc; --text-s: #94a3b8;
            --accent: #10b981; --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text-p); height: 100vh; overflow: hidden; display: flex; }

        /* AUTH MODAL */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--card); padding: 40px; border-radius: 24px; width: 100%; max-width: 400px;
            text-align: center; border: 1px solid var(--glass); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* MAIN LAYOUT */
        #nexus-app { display: none; width: 100%; height: 100vh; flex-direction: row; }

        /* SIDEBAR */
        #sidebar {
            width: 360px; background: var(--side); border-right: 1px solid var(--glass);
            display: flex; flex-direction: column;
        }
        .search-bar { padding: 20px; border-bottom: 1px solid var(--glass); }
        .search-bar input {
            width: 100%; padding: 12px 16px; border-radius: 12px; border: none;
            background: var(--card); color: white; outline: none;
        }

        .user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item {
            display: flex; align-items: center; padding: 15px; border-radius: 12px;
            cursor: pointer; transition: 0.2s; margin-bottom: 5px; position: relative;
        }
        .user-item:hover { background: var(--glass); }
        .user-item.active { background: rgba(99, 102, 241, 0.15); border-left: 4px solid var(--primary); }
        .online-indicator {
            width: 12px; height: 12px; background: var(--accent); border-radius: 50%;
            border: 2px solid var(--side); position: absolute; bottom: 15px; left: 45px;
        }

        /* CHAT WINDOW */
        #chat-window { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-header {
            padding: 15px 30px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass);
        }

        #messages-view {
            flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
            background-image: radial-gradient(var(--glass) 1px, transparent 1px); background-size: 20px 20px;
        }

        .msg { max-width: 60%; padding: 12px 18px; border-radius: 18px; position: relative; line-height: 1.5; font-size: 14px; }
        .msg.sent { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; border: 1px solid var(--glass); }
        .msg-time { font-size: 10px; opacity: 0.6; margin-top: 5px; text-align: right; }

        /* INPUT AREA */
        .input-box {
            padding: 25px 40px; background: var(--side); display: flex; align-items: center; gap: 15px;
            border-top: 1px solid var(--glass);
        }
        .input-box input {
            flex: 1; padding: 14px 20px; border-radius: 14px; border: none; background: var(--card); color: white;
        }

        /* CALL OVERLAY */
        #call-ui {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .video-container { display: flex; gap: 20px; margin-bottom: 40px; }
        video { width: 45vw; height: 60vh; background: #222; border-radius: 20px; object-fit: cover; }

        /* ANIMATIONS */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="letter-spacing:-2px; margin-bottom:10px;">NEXUS</h1>
            <p style="color:var(--text-s); margin-bottom:30px;">Professional Secure Messaging</p>
            <input type="text" id="username-in" class="search-bar" placeholder="Choose a Unique Username" style="margin-bottom:15px; border: 1px solid #334155;">
            <button onclick="login()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">Launch Nexus</button>
        </div>
    </div>

    <div id="nexus-app">
        <aside id="sidebar">
            <div class="side-header" style="padding:25px; border-bottom:1px solid var(--glass)">
                <h2 id="display-my-name">Me</h2>
                <p style="font-size:12px; color:var(--accent)">● Online</p>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search direct messages...">
            </div>
            <div id="user-list" class="user-list">
                </div>
        </aside>

        <main id="chat-window">
            <header id="chat-header">
                <div>
                    <h3 id="active-user-name">Welcome to Nexus</h3>
                    <p id="typing-status" style="font-size:12px; color:var(--accent); display:none;">is typing...</p>
                </div>
                <div style="display:flex; gap:20px;">
                    <i data-lucide="video" class="btn" style="cursor:pointer" onclick="initCall()"></i>
                    <i data-lucide="phone" class="btn" style="cursor:pointer"></i>
                    <i data-lucide="more-vertical" class="btn"></i>
                </div>
            </header>

            <div id="messages-view">
                <div style="text-align:center; color:var(--text-s); margin-top:100px;">
                    <i data-lucide="shield-check" style="margin-bottom:10px;"></i>
                    <p>End-to-End Encrypted via Nexus Signaling</p>
                </div>
            </div>

            <div class="input-box">
                <i data-lucide="plus-circle" style="cursor:pointer"></i>
                <input type="text" id="main-input" placeholder="Type a secure message..." oninput="emitTyping()">
                <button onclick="sendMsg()" style="background:var(--primary); color:white; border:none; padding:12px 24px; border-radius:12px; font-weight:bold; cursor:pointer;">Send</button>
            </div>
        </main>
    </div>

    <div id="call-ui">
        <div class="video-container">
            <video id="remote-video" autoplay></video>
            <video id="local-video" autoplay muted style="width:20vw; height:30vh; position:absolute; bottom:150px; right:50px; border:2px solid var(--primary);"></video>
        </div>
        <div style="display:flex; gap:30px;">
            <button onclick="endCall()" style="background:var(--danger); padding:20px 40px; border-radius:50px; color:white; border:none; cursor:pointer;">End Call</button>
        </div>
    </div>

    <script>
        // --- NEXUS PRO LOGIC ENGINE ---
        lucide.createIcons();
        
        // CHANGE THIS TO YOUR RENDER URL
        const socket = io('http://localhost:3000'); 
        
        let me = "";
        let activeTarget = "";
        let chatHistory = JSON.parse(localStorage.getItem('nexus_history')) || {};

        // LOGIN
        function login() {
            const name = document.getElementById('username-in').value;
            if(!name) return;
            me = name;
            localStorage.setItem('nexus_me', me);
            socket.emit('nexus-auth', me);
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('nexus-app').style.display = 'flex';
            document.getElementById('display-my-name').innerText = me;
        }

        // USER TRACKING
        socket.on('user-status-change', (users) => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            users.forEach(user => {
                if(user === me) return;
                const div = document.createElement('div');
                div.className = `user-item ${activeTarget === user ? 'active' : ''}`;
                div.onclick = () => selectUser(user);
                div.innerHTML = `
                    <div class="avatar" style="width:40px; height:40px; background:var(--primary); border-radius:12px; margin-right:15px; display:flex; align-items:center; justify-content:center; font-weight:bold;">${user[0].toUpperCase()}</div>
                    <div>
                        <div style="font-weight:bold;">${user}</div>
                        <div style="font-size:12px; color:var(--text-s);">Available on Nexus</div>
                    </div>
                    <div class="online-indicator"></div>
                `;
                list.appendChild(div);
            });
        });

        function selectUser(user) {
            activeTarget = user;
            document.getElementById('active-user-name').innerText = user;
            renderMessages();
            // Update UI list active state
            const items = document.querySelectorAll('.user-item');
            items.forEach(i => i.classList.remove('active'));
        }

        // MESSAGING
        function sendMsg() {
            const val = document.getElementById('main-input').value;
            if(!val || !activeTarget) return;

            socket.emit('send-private-msg', { to: activeTarget, text: val, from: me });
            document.getElementById('main-input').value = "";
        }

        socket.on('receive-private-msg', (data) => {
            saveMsg(data.from, data);
            if(activeTarget === data.from) renderMessages();
            else alert(`New message from ${data.from}`);
        });

        socket.on('msg-sent-confirmation', (data) => {
            saveMsg(activeTarget, data);
            renderMessages();
        });

        function saveMsg(friend, data) {
            if(!chatHistory[friend]) chatHistory[friend] = [];
            chatHistory[friend].push(data);
            localStorage.setItem('nexus_history', JSON.stringify(chatHistory));
        }

        function renderMessages() {
            const view = document.getElementById('messages-view');
            view.innerHTML = "";
            const history = chatHistory[activeTarget] || [];
            history.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.from === me ? 'sent' : 'received'}`;
                div.innerHTML = `
                    <div>${m.text}</div>
                    <div class="msg-time">${new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                `;
                view.appendChild(div);
            });
            view.scrollTop = view.scrollHeight;
        }

        // TYPING INDICATOR
        let typingTimer;
        function emitTyping() {
            socket.emit('typing-start', { to: activeTarget });
        }

        socket.on('friend-typing', ({ from }) => {
            if(from === activeTarget) {
                const status = document.getElementById('typing-status');
                status.style.display = 'block';
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => status.style.display = 'none', 2000);
            }
        });

        // WEBRTC VIDEO (Conceptual Trigger)
        async function initCall() {
            document.getElementById('call-ui').style.display = 'flex';
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = stream;
            // Real WebRTC needs a library like simple-peer to handle 'signalData' here.
        }

        function endCall() {
            document.getElementById('call-ui').style.display = 'none';
            const stream = document.getElementById('local-video').srcObject;
            if(stream) stream.getTracks().forEach(track => track.stop());
        }
    </script>
</body>
</html>
