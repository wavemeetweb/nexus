<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus | Next-Gen Learning</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #6366f1; 
            --accent: #10b981; 
            --bg: #020617; 
            --card-bg: rgba(30, 41, 59, 0.5);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            color: #f1f5f9;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, transparent);
            overflow-x: hidden;
        }

        /* MODERN GLASS BUTTON */
        .glass-btn {
            background: var(--primary);
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        .glass-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.5);
        }

        /* LOGIN SCREEN */
        #auth-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero-text {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(to bottom right, #fff, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: -2px;
        }

        /* DASHBOARD GRID */
        #dashboard { display: none; padding: 60px 10%; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .modern-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modern-card:hover {
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.8);
            transform: scale(1.02);
        }

        /* FORM INPUTS */
        input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            color: white;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
            margin: 15px 0;
            font-family: inherit;
        }

        /* MEETING INTERFACE */
        #meeting-view { 
            display: none; 
            height: 100vh; 
            grid-template-columns: 1fr 350px;
            background: #000;
        }

        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .video-box {
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 1px solid #222;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .controls-floating {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 12px 30px;
            border-radius: 100px;
            display: flex;
            gap: 20px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 class="hero-text">NEXUS</h1>
        <p style="color: #94a3b8; font-size: 1.2rem; margin-bottom: 40px;">The Future of Digital Classrooms.</p>
        <button class="glass-btn" onclick="signInWithGoogle()">Get Started — Free</button>
    </div>

    <div id="dashboard">
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div>
                <h2 style="font-size: 2.5rem; margin:0;">Welcome back, <span id="user-name-display" style="color:var(--primary)">...</span></h2>
                <p style="color: #64748b;">Manage your sessions and connect with students.</p>
            </div>
            <button onclick="logout()" style="color:#ef4444; background:none; border:none; cursor:pointer;">Sign Out</button>
        </div>

        <div class="dashboard-grid">
            <div class="modern-card">
                <div style="font-size: 2rem; margin-bottom: 15px;">⚡</div>
                <h3>Instant Session</h3>
                <p style="color:#64748b; font-size:0.9rem;">Generate a high-speed room link and start teaching now.</p>
                <button class="glass-btn" style="width:100%; margin-top:20px;" onclick="startMeeting()">Launch Now</button>
            </div>

            <div class="modern-card">
                <div style="font-size: 2rem; margin-bottom: 15px;">🗓️</div>
                <h3>Schedule Room</h3>
                <p style="color:#64748b; font-size:0.9rem;">Set a fixed time for Class 10/12. Auto-notifies students.</p>
                <button class="glass-btn" style="width:100%; margin-top:20px; background:#334155;">Plan Ahead</button>
            </div>

            <div class="modern-card">
                <div style="font-size: 2rem; margin-bottom: 15px;">🔗</div>
                <h3>Join Classroom</h3>
                <input type="text" id="join-room-id" placeholder="Enter 6-Digit ID">
                <button class="glass-btn" style="width:100%; background:var(--accent);">Connect</button>
            </div>
        </div>
    </div>

    <div class="controls-floating">
        <button class="glass-btn" style="padding: 10px 20px; background:#1e293b;">Mic</button>
        <button class="glass-btn" style="padding: 10px 20px; background:#1e293b;">Cam</button>
        <button class="glass-btn" style="padding: 10px 20px; background:#ef4444;" onclick="location.reload()">End</button>
    </div>

    <script>
        // Your Firebase and Logic go here...
    </script>
</body>
</html>
