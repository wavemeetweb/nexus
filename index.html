<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Zenith Nexus</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <style>
        :root { --bg: #050608; --accent: #6366f1; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --text: #f8fafc; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        #sidebar { width: 350px; border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; z-index: 10; background: var(--bg); }
        #chat-window { flex: 1; display: flex; flex-direction: column; background: #000; }

        @media (max-width: 768px) {
            #sidebar { position: absolute; width: 100%; height: 100%; left: 0; }
            #sidebar.hidden { transform: translateX(-100%); }
        }

        #messages { flex: 1; overflow-y: auto; padding: 15px 10px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 12px 16px; border-radius: 20px; max-width: 85%; font-size: 15px; cursor: pointer; }
        .sent { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .recv { align-self: flex-start; background: var(--glass); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        
        .header { height: 65px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); gap: 10px; }
        .input-area { padding: 10px; display: flex; gap: 10px; align-items: center; border-top: 1px solid var(--border); }
        input { flex:1; background: var(--glass); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 25px; outline: none; }
        
        #req-banner { display:none; background:var(--accent); padding:10px; margin:10px; border-radius:10px; justify-content:space-between; align-items:center; font-size:13px; }
    </style>
</head>
<body>
    <aside id="sidebar">
        <div style="padding:20px; display:flex; justify-content:space-between;">
            <h2>ZENITH</h2>
            <i data-lucide="user-plus" onclick="addFriend()"></i>
        </div>
        <div id="req-banner">
            <span id="req-txt"></span>
            <button onclick="acceptReq()" style="background:#fff; color:#000; border:none; padding:4px 8px; border-radius:4px;">Accept</button>
        </div>
        <div id="contact-list" style="flex:1"></div>
    </aside>

    <main id="chat-window">
        <header class="header">
            <i data-lucide="arrow-left" id="back-btn" style="display:none" onclick="goBack()"></i>
            <h3 id="active-title">Select Chat</h3>
        </header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="m-in" placeholder="Message..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" style="background:var(--accent); border:none; padding:10px; border-radius:50%; color:#fff;"><i data-lucide="send"></i></button>
        </div>
    </main>

    <script>
        const socket = io();
        let myU = "", activeT = "", pendingFrom = "";

        window.onload = async () => {
            myU = await localforage.getItem('u') || prompt("Username:").toLowerCase().trim();
            if(myU) {
                await localforage.setItem('u', myU);
                socket.emit('auth', myU);
            }
            lucide.createIcons();
            renderList();
        };

        async function addFriend() {
            const target = prompt("Target Username:");
            if(target) socket.emit('send-request', { to: target });
        }

        socket.on('notify-request', (d) => {
            pendingFrom = d.from;
            document.getElementById('req-txt').innerText = `${d.from} wants to chat`;
            document.getElementById('req-banner').style.display = 'flex';
        });

        async function acceptReq() {
            const friends = await localforage.getItem('friends') || [];
            if(!friends.includes(pendingFrom)) friends.push(pendingFrom);
            await localforage.setItem('friends', friends);
            document.getElementById('req-banner').style.display = 'none';
            renderList();
        }

        async function send() {
            const val = document.getElementById('m-in').value;
            if(!val || !activeT) return;
            const msg = { to: activeT, text: val, from: 'Me', id: 'm_'+Date.now() };
            socket.emit('msg-send', msg);
            await saveMsg(activeT, msg);
            renderBubble(msg);
            document.getElementById('m-in').value = "";
        }

        socket.on('msg-recv', async (d) => {
            await saveMsg(d.from, d);
            if(activeT === d.from) renderBubble(d);
        });

        async function renderList() {
            const friends = await localforage.getItem('friends') || [];
            const container = document.getElementById('contact-list');
            container.innerHTML = "";
            friends.forEach(f => {
                const div = document.createElement('div');
                div.style.padding = "15px"; div.style.cursor = "pointer";
                div.innerHTML = `<b>👤 ${f}</b>`;
                div.onclick = () => {
                    activeT = f;
                    document.getElementById('active-title').innerText = f;
                    if(window.innerWidth < 768) {
                        document.getElementById('sidebar').classList.add('hidden');
                        document.getElementById('back-btn').style.display = "block";
                    }
                    loadHistory();
                };
                container.appendChild(div);
            });
        }

        async function loadHistory() {
            document.getElementById('messages').innerHTML = "";
            const h = await localforage.getItem('chat_'+activeT) || [];
            h.forEach(renderBubble);
        }

        function renderBubble(m) {
            const b = document.createElement('div');
            b.className = `bubble ${m.from === 'Me' ? 'sent' : 'recv'}`;
            b.innerText = m.text;
            document.getElementById('messages').appendChild(b);
            document.getElementById('messages').scrollTop = 99999;
        }

        function goBack() { document.getElementById('sidebar').classList.remove('hidden'); }
        async function saveMsg(id, m) {
            const h = await localforage.getItem('chat_'+id) || [];
            h.push(m); await localforage.setItem('chat_'+id, h);
        }
    </script>
</body>
</html>
