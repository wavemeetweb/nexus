<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Zenith</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0d1117; --side: #161b22; --p: #5865f2; --card: #21262d; --text: #c9d1d9; --dim: #8b949e; --border: #30363d; --danger: #f85149; }
        body.light-mode { --bg: #ffffff; --side: #f6f8fa; --p: #0969da; --card: #ffffff; --text: #1f2328; --dim: #656d76; --border: #d0d7de; }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; transition: background 0.2s; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        #sidebar { width: 320px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        #chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }

        .section-label { font-size: 11px; font-weight: bold; color: var(--dim); padding: 15px 15px 5px; text-transform: uppercase; letter-spacing: 1px; }
        .list-item { padding: 10px 15px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-left: 3px solid transparent; }
        .list-item:hover { background: rgba(255,255,255,0.05); }
        .list-item.active { background: var(--card); border-left-color: var(--p); }
        
        .av { width: 35px; height: 35px; border-radius: 10px; background: var(--p); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; margin: 4px 0; font-size: 14px; position: relative; }
        .sent { align-self: flex-end; background: var(--p); color: white; border-bottom-right-radius: 2px; }
        .recv { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        
        .status { font-size: 10px; margin-left: 5px; opacity: 0.7; }
        .read { color: #3fb950 !important; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
        .modal { background: var(--side); padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid var(--border); }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: white; margin-top: 10px; }
        
        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; inset: 0; }
            #chat-main { width: 100%; position: absolute; inset: 0; display: none; }
            body.in-chat #sidebar { display: none; }
            body.in-chat #chat-main { display: flex; }
        }
    </style>
</head>
<body>

    <div id="auth-modal" class="overlay" style="display: flex;">
        <div class="modal">
            <h2>NEXUS</h2>
            <input type="text" id="auth-in" placeholder="Username...">
            <button onclick="login()" style="width:100%; margin-top:15px; padding:12px; background:var(--p); color:white; border:none; border-radius:8px; cursor:pointer;">Connect</button>
        </div>
    </div>

    <aside id="sidebar">
        <div style="padding:15px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border);">
            <div style="display:flex; align-items:center; gap:8px;">
                <div class="av" id="my-av" style="width:28px; height:28px; font-size:12px;">?</div>
                <b id="my-name" style="font-size:14px;">...</b>
            </div>
            <div style="display:flex; gap:12px; color:var(--dim);">
                <i data-lucide="sun" onclick="toggleTheme()" style="width:18px; cursor:pointer;"></i>
                <i data-lucide="user-plus" onclick="sendReq()" style="width:18px; cursor:pointer;"></i>
            </div>
        </div>
        
        <div id="list-pending"></div>
        
        <div style="flex:1; overflow-y:auto;">
            <div class="section-label">Messages</div>
            <div id="list-friends"></div>
            <div class="section-label">Groups</div>
            <div id="list-groups"></div>
        </div>
    </aside>

    <main id="chat-main">
        <header style="height:60px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 15px; justify-content:space-between;">
            <div style="display:flex; align-items:center;">
                <i data-lucide="arrow-left" onclick="document.body.classList.remove('in-chat')" style="margin-right:15px; cursor:pointer;" class="mobile-only"></i>
                <h4 id="active-title">Nexus</h4>
            </div>
            <i data-lucide="ban" onclick="blockCurrent()" style="color:var(--danger); cursor:pointer; width:18px;"></i>
        </header>
        
        <div id="messages" style="flex:1; padding:15px; overflow-y:auto; display:flex; flex-direction:column;"></div>

        <div style="padding:15px; background:var(--side); display:flex; gap:10px; align-items:center;">
            <label style="cursor:pointer; color:var(--dim)"><i data-lucide="plus"></i><input type="file" id="f-in" style="display:none" onchange="fileUp(this)"></label>
            <input type="text" id="msg-in" placeholder="Message..." style="flex:1; margin:0;" onkeypress="if(event.key==='Enter')send()">
            <i data-lucide="send" onclick="send()" style="color:var(--p); cursor:pointer;"></i>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const socket = io('https://nexus-w4w9.onrender.com'); // UPDATE THIS
        let myId = "", activeTarget = "", isGroup = false, pendingFile = null;

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function login() { const n = document.getElementById('auth-in').value; if(n){ myId=n; socket.emit('nexus-auth', n); document.getElementById('auth-modal').style.display='none'; }}

        socket.on('ui-sync', (data) => {
            document.getElementById('my-name').innerText = data.profile.name;
            document.getElementById('my-av').innerText = data.profile.name[0].toUpperCase();
            
            // Pending Requests
            const pList = document.getElementById('list-pending'); pList.innerHTML = "";
            data.pending.forEach(p => {
                pList.innerHTML += `<div style="padding:10px 15px; background:rgba(88,101,242,0.1); display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:12px;">Request from <b>${p}</b></span>
                    <button onclick="socket.emit('friend-request-accept','${p}')" style="background:var(--p); color:white; border:none; padding:4px 8px; border-radius:4px; font-size:10px; cursor:pointer;">Accept</button>
                </div>`;
            });

            // Friends & Groups
            renderSection('list-friends', data.friends, 'dm');
            renderSection('list-groups', data.groups, 'group');
        });

        function renderSection(id, items, type) {
            const el = document.getElementById(id); el.innerHTML = "";
            items.forEach(item => {
                const name = type === 'group' ? item.name : item;
                const targetId = type === 'group' ? item.id : item;
                const d = document.createElement('div');
                d.className = `list-item ${activeTarget === targetId ? 'active' : ''}`;
                d.innerHTML = `<div class="av" style="width:30px; height:30px; font-size:12px;">${name[0].toUpperCase()}</div><div style="font-size:14px;">${name}</div>`;
                d.onclick = () => {
                    activeTarget = targetId; isGroup = (type === 'group');
                    document.getElementById('active-title').innerText = name;
                    document.body.classList.add('in-chat');
                    document.getElementById('messages').innerHTML = "";
                };
                el.appendChild(d);
            });
        }

        function fileUp(i) { if(i.files[0]) pendingFile = i.files[0]; }

        function send() {
            const text = document.getElementById('msg-in').value;
            if(!activeTarget) return;
            const payload = { to: activeTarget, text, type: isGroup ? 'group' : 'dm' };

            const commit = (f = null) => {
                if(f) payload.file = f;
                socket.emit('msg-out', payload);
                renderMsg('Me', text, 'sent', f, 'waiting');
                document.getElementById('msg-in').value = ""; pendingFile = null;
            };

            if(pendingFile) {
                const r = new FileReader();
                r.onload = (e) => commit({ name: pendingFile.name, type: pendingFile.type, data: e.target.result });
                r.readAsDataURL(pendingFile);
            } else commit();
        }

        socket.on('msg-in', (d) => {
            if(isGroup ? d.channel === activeTarget : d.fromSlug === activeTarget.toLowerCase()) {
                renderMsg(d.from, d.text, 'recv', d.file, d.id);
                if(!isGroup) socket.emit('msg-seen', { mId: d.id, toSlug: d.fromSlug });
            }
        });

        socket.on('msg-status', ({ id, status }) => {
            const el = document.querySelector(`[data-id="${id}"] .status`);
            if(el) {
                if(status === 'delivered') el.innerText = '✓✓';
                if(status === 'read') { el.innerText = '✓✓'; el.classList.add('read'); }
            }
        });

        function renderMsg(s, t, side, f, mid) {
            let m = "";
            if(f) {
                if(f.type.includes('image')) m = `<img src="${f.data}" style="max-width:100%; border-radius:8px; margin-top:5px; display:block;">`;
                else m = `<a href="${f.data}" download style="color:white; font-size:11px; display:block; margin-top:5px;">📎 ${f.name}</a>`;
            }
            const d = document.createElement('div');
            d.className = `bubble ${side}`; d.setAttribute('data-id', mid);
            d.innerHTML = `<small style="display:block; font-size:10px; opacity:0.6;">${s}</small>${t}${m}<span class="status">${side==='sent'?'✓':''}</span>`;
            document.getElementById('messages').appendChild(d);
            document.getElementById('messages').scrollTop = 99999;
        }

        function sendReq() { const n = prompt("Target Username:"); if(n) socket.emit('friend-request-send', n); }
        function blockCurrent() { if(confirm("Block user?")) socket.emit('user-block', activeTarget); }
        socket.on('sys-msg', (m) => alert(m));
    </script>
</body>
</html>
